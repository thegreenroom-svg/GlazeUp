<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Kiln Cafe · Your Session</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="apple-touch-icon" href="/app/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kiln Cafe">
  <meta name="theme-color" content="#2B2724">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --link-charcoal: #2B2724;
      --link-clay: #B87946;
      --link-sand: #E8D9C4;
      --link-ivory: #F7F4EE;
      --link-stone: #C8BFB2;

      --gu-bg: var(--link-ivory);
      --gu-primary: var(--link-clay);
      --gu-accent: var(--link-charcoal);
      --gu-dust: #8a8175;
      --gu-border: var(--link-stone);
      --gu-font-display: 'Instrument Sans', 'Inter', -apple-system, system-ui, sans-serif;
      --gu-font-body: 'Instrument Sans', 'Inter', -apple-system, system-ui, sans-serif;

      --glaze-oxblood-base: var(--link-clay);
      --glaze-oxblood-high: #d19867;
      --glaze-oxblood-deep: #8f5c32;
      --glaze-ocean-base: #5b6b68;
      --glaze-ocean-high: #7f9490;
      --glaze-ocean-deep: #3e4a47;
      --glaze-honey-base: #c9a06b;
      --glaze-honey-high: #ddb98a;
      --glaze-honey-deep: #8f6a3f;
      --glaze-sage-base: #6b7561;
      --glaze-sage-high: #93a086;
      --glaze-sage-deep: #454d3d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--gu-font-body);
      background: var(--gu-bg);
      color: var(--gu-accent);
      -webkit-tap-highlight-color: transparent;
    }

    /* Warm glazed top banner */
    .app-header {
      background: var(--link-charcoal);
      color: #fff;
      padding: 28px 22px 32px;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 14px -4px rgba(43,39,36,0.3);
    }

    .app-header .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: var(--gu-font-display);
      font-size: 15px;
      font-weight: 600;
      opacity: 0.85;
    }

    .app-header .logo-mark {
      width: 26px; height: 26px;
    }

    .app-header .greeting {
      margin-top: 18px;
      font-family: var(--gu-font-display);
      font-size: 26px;
      font-weight: 600;
      line-height: 1.15;
    }

    .app-header .sub {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.85;
    }

    .content { padding: 20px 18px 60px; }

    .loading, .error-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--gu-dust);
    }
    .error-state h2 {
      font-family: var(--gu-font-display);
      color: var(--gu-primary);
    }

    /* Shimmer skeleton shown while the booking loads — mimics the real layout */
    .skel-header {
      height: 130px;
      border-radius: 0 0 26px 26px;
      background: linear-gradient(90deg, #e8d9d0 25%, #f2e6df 37%, #e8d9d0 63%);
      background-size: 400% 100%;
      animation: skelShimmer 1.4s ease infinite;
    }
    .skel-block {
      height: 64px;
      border-radius: 16px;
      margin: 16px 18px;
      background: linear-gradient(90deg, #ede2da 25%, #f5ede7 37%, #ede2da 63%);
      background-size: 400% 100%;
      animation: skelShimmer 1.4s ease infinite;
    }
    @keyframes skelShimmer {
      0% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .skel-header, .skel-block { animation: none; }
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      color: var(--gu-dust);
      margin: 24px 4px 12px;
    }

    /* Feature tiles — glossy dipped-glaze cards */
    .tile {
      position: relative;
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      color: #fff;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 14px;
      cursor: pointer;
      font-family: var(--gu-font-body);
      box-shadow: 0 1px 2px rgba(43,39,36,0.1), 0 6px 16px -6px rgba(43,39,36,0.18);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      background: var(--tile-base);
    }
    .tile:active {
      transform: scale(0.98);
      opacity: 0.92;
    }
    .tile .tile-title { font-family: var(--gu-font-display); font-size: 18px; font-weight: 600; }
    .tile .tile-desc { font-size: 13px; opacity: 0.9; margin-top: 4px; line-height: 1.4; }
    .tile .tile-icon { font-size: 24px; margin-bottom: 8px; display: block; }
    .tile.soon { opacity: 0.5; cursor: default; }
    .tile.soon::after {
      content: 'Coming soon';
      position: absolute; top: 14px; right: 16px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      background: rgba(255,255,255,0.25); padding: 3px 8px; border-radius: 20px;
    }

    .tile-oxblood { --tile-base: var(--link-clay); }
    .tile-sage { --tile-base: var(--glaze-sage-base); }
    .tile-ocean { --tile-base: var(--glaze-ocean-base); }
    .tile-honey { --tile-base: var(--glaze-honey-base); }

    /* Pieces / info card */
    .info-card {
      background: linear-gradient(180deg, #ffffff 0%, #fdf9f6 100%);
      border: 1px solid var(--gu-border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(61,28,18,0.06), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .info-card .row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .info-card .row + .row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gu-border); }
    .info-card .k { color: var(--gu-dust); }
    .info-card .v { font-weight: 600; }

    @media (prefers-reduced-motion: reduce) {
      .tile { transition: none; }
      .tile:active { transform: none; }
    }

    .a2hs-banner {
      position: fixed;
      left: 14px; right: 14px; bottom: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fdf9f6 100%);
      border: 1px solid var(--gu-border);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 10px 28px -8px rgba(61,28,18,0.35);
      z-index: 900;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .a2hs-banner .a2hs-icon { font-size: 22px; flex-shrink: 0; }
    .a2hs-banner .a2hs-text { flex: 1; font-size: 12.5px; line-height: 1.4; color: var(--gu-accent); }
    .a2hs-banner .a2hs-text b { color: var(--gu-primary); }
    .a2hs-banner button {
      flex-shrink: 0;
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .a2hs-banner .a2hs-dismiss { background: none; color: var(--gu-dust); }
    .a2hs-banner .a2hs-install { background: var(--glaze-oxblood-base); color: #fff; }

    /* ── Design Preview tool ── */
    #design-preview-screen {
      position: fixed;
      inset: 0;
      background: #1a1210;
      z-index: 2000;
      display: none;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #design-preview-screen.open {
      transform: translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      #design-preview-screen { transition: none; }
    }

    /* ── Splash / launch screen — shown once per app open, tap anywhere to continue ── */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 5000;
      background: var(--link-charcoal);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      opacity: 0;
      animation: splashFadeIn 0.6s ease forwards;
      cursor: pointer;
      overflow: hidden;
    }
    #splash-screen.fading-out {
      animation: splashFadeOut 0.5s ease forwards;
    }
    @keyframes splashFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes splashFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .splash-word {
      position: relative;
      display: flex;
      align-items: baseline;
      justify-content: center;
      font-family: var(--gu-font-display);
      font-weight: 700;
      font-size: 68px;
      letter-spacing: 0.03em;
      color: #fff;
      line-height: 1;
    }

    .splash-letter {
      display: inline-block;
      opacity: 0;
      transform: rotate(-280deg) scale(0.25) translateY(30px);
      animation: letterSpinIn 0.85s cubic-bezier(0.34, 1.4, 0.4, 1) forwards;
    }
    .splash-letter svg {
      height: 1em;
      width: auto;
      display: block;
    }
    .splash-letter:nth-child(1) { animation-delay: 0.15s; }
    .splash-letter:nth-child(2) { animation-delay: 0.28s; }
    .splash-letter:nth-child(4) { animation-delay: 0.54s; }

    @keyframes letterSpinIn {
      0% { opacity: 0; transform: rotate(-280deg) scale(0.25) translateY(30px); }
      65% { opacity: 1; transform: rotate(14deg) scale(1.08) translateY(0); }
      100% { opacity: 1; transform: rotate(0deg) scale(1) translateY(0); }
    }

    /* ── The N is secretly the link: reads as the arch from the KILN mark,
       but shortly after landing it does a quiet 3D flip — revealing an
       interlocking chain-link glyph on its hidden "back face" for a
       moment, then continues rotating back to the arch. A real flip
       (CSS 3D + backface-visibility), not a fake crossfade, so it holds
       up on close inspection the way restrained motion on Apple/Linear/
       Arc/Notion does. ── */
    .n-flip-stage {
      display: inline-block;
      opacity: 0;
      animation: letterSpinIn 0.85s cubic-bezier(0.34, 1.4, 0.4, 1) forwards;
      animation-delay: 0.41s;
      -webkit-perspective: 300px;
      perspective: 300px;
    }
    .n-flip-inner {
      position: relative;
      width: 0.65em;
      height: 1em;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      animation: nFlipReveal 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      animation-delay: 1.55s;
    }
    .n-face {
      position: absolute;
      inset: 0;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .n-face-front svg {
      height: 1em;
      width: auto;
    }
    .n-face-back {
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
    }
    .n-face-back svg {
      width: 78%;
      height: 78%;
    }
    @keyframes nFlipReveal {
      0%   { -webkit-transform: rotateY(0deg); transform: rotateY(0deg); }
      100% { -webkit-transform: rotateY(360deg); transform: rotateY(360deg); }
    }

    .splash-strapline {
      margin-top: 16px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--link-clay);
      opacity: 0;
      animation: splashLineFadeUp 0.6s ease forwards;
      animation-delay: 6.0s;
    }

    .splash-tagline {
      margin-top: 14px;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      opacity: 0;
      animation: splashLineFadeUp 0.6s ease forwards;
      animation-delay: 6.2s;
    }
    .splash-endorsement {
      margin-top: 22px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      opacity: 0;
      animation: splashLineFadeUp 0.6s ease forwards;
      animation-delay: 6.4s;
    }
    @keyframes splashLineFadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .splash-hint {
      position: absolute;
      bottom: 48px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      opacity: 0;
      animation: splashLineFadeUp 0.6s ease forwards;
      animation-delay: 6.7s;
    }

    /* ── Animated arrow motif — splash only. Traces K, over the kiln, to I,
       to L, then dips back into the kiln for a final stop. Matches the
       flowing arrow motif from thekilncafe.com. Drawn with real measured
       coordinates (see drawSplashArrows in JS) so it lines up exactly
       with the rendered letters regardless of layout. ── */
    #splash-arrow-overlay {
      position: absolute;
      pointer-events: none;
      overflow: visible;
    }
    .splash-arrow-path {
      fill: none;
      stroke: #B87946;
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0;
    }
    .splash-arrow-path.drawing {
      opacity: 1;
      animation: splashArrowDraw 0.9s cubic-bezier(0.65,0,0.35,1) forwards;
    }
    @keyframes splashArrowDraw {
      from { stroke-dashoffset: var(--len); }
      to { stroke-dashoffset: 0; }
    }
    .splash-flame {
      opacity: 0;
      transform: scale(0.6) translateY(4px);
      transform-origin: center bottom;
    }
    .splash-flame.showing {
      animation: splashFlameIn 0.5s ease forwards;
    }
    @keyframes splashFlameIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      #splash-screen, #splash-screen.fading-out { animation: none; opacity: 1; }
      .splash-letter, .splash-strapline, .splash-tagline, .splash-endorsement, .splash-hint, .n-flip-stage {
        animation: none; opacity: 1; transform: none;
      }
      .n-flip-inner { animation: none; }
      .splash-arrow-path, .splash-flame { animation: none; opacity: 1; }
    }

    .dp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #241a17;
      color: #fff;
      flex-shrink: 0;
    }
    .dp-header .dp-title { font-family: var(--gu-font-display); font-size: 17px; font-weight: 700; }
    .dp-header button {
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .dp-canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    #dp-photo-prompt {
      text-align: center;
      color: rgba(255,255,255,0.85);
      padding: 24px;
    }
    #dp-photo-prompt button {
      margin-top: 16px;
      background: var(--glaze-honey-base);
      color: #3d1c12;
      border: none;
      padding: 14px 22px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .dp-canvas-stack {
      position: relative;
      max-width: 100%;
      max-height: 100%;
      display: none;
    }
    .dp-canvas-stack canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    .dp-sticker {
      position: absolute;
      border-radius: 50%;
      opacity: 0.55;
      touch-action: none;
      cursor: grab;
      border: 2px solid rgba(255,255,255,0.6);
    }
    .dp-sticker .dp-sticker-resize {
      position: absolute;
      right: -6px; bottom: -6px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      border: 2px solid var(--gu-primary);
      cursor: nwse-resize;
    }
    .dp-sticker .dp-sticker-remove {
      position: absolute;
      top: -8px; right: -8px;
      width: 20px; height: 20px;
      background: #d9534f;
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      cursor: pointer;
      border: 2px solid #fff;
    }

    .dp-toolbar {
      flex-shrink: 0;
      background: #241a17;
      padding: 10px 12px 14px;
    }

    .dp-tool-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .dp-tool-btn {
      flex: 1;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 6px;
      font-size: 11px;
      text-align: center;
      cursor: pointer;
    }
    .dp-tool-btn.active {
      background: var(--glaze-honey-base);
      color: #3d1c12;
      font-weight: 700;
      border-color: transparent;
    }
    .dp-tool-btn .dp-tool-icon { font-size: 18px; display: block; margin-bottom: 2px; }

    .dp-sub-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .dp-sub-row label { font-size: 11px; color: rgba(255,255,255,0.7); flex-shrink: 0; }
    .dp-sub-row input[type="range"] { flex: 1; }

    .dp-brush-sizes { display: flex; gap: 6px; }
    .dp-brush-size-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .dp-brush-size-btn .dot { background: #fff; border-radius: 50%; }
    .dp-brush-size-btn.active { border-color: var(--glaze-honey-base); background: rgba(255,214,128,0.2); }

    .dp-palette {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .dp-swatch {
      flex-shrink: 0;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      cursor: pointer;
    }
    .dp-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px var(--glaze-honey-base); }

    .dp-actions { display: flex; gap: 8px; margin-top: 10px; }
    .dp-actions button {
      flex: 1;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 9px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="splash-word">
      <span class="splash-letter"><svg viewBox="0 0 58 80" aria-hidden="true"><path d="M4.00,76.00 L4.00,4.00 L19.41,4.00 L19.41,76.00 L4.00,76.00 Z M11.20,76.00 L11.20,64.20 L54.00,64.20 L54.00,76.00 L11.20,76.00 Z" fill="#fff"/></svg></span><span class="splash-letter"><svg viewBox="0 0 23.4 80" aria-hidden="true"><path d="M4.00,76.00 L4.00,4.00 L19.41,4.00 L19.41,76.00 L4.00,76.00 Z" fill="#fff"/></svg></span><span class="n-flip-stage"><span class="n-flip-inner">
        <span class="n-face n-face-front">
          <svg viewBox="-10 -10 72 92" aria-hidden="true">
            <path d="M 4,72 L 10,72 L 10,30 C 10,10 18,2 28,2 C 38,2 46,10 46,30 L 46,72 L 52,72" fill="none" stroke="#B87946" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="n-face n-face-back">
          <svg viewBox="0 0 62 100" aria-hidden="true">
            <rect x="6" y="4" width="50" height="52" rx="25" fill="none" stroke="#ffffff" stroke-width="11"/>
            <rect x="6" y="44" width="50" height="52" rx="25" fill="none" stroke="#B87946" stroke-width="11"/>
          </svg>
        </span>
      </span></span><span class="splash-letter"><svg viewBox="0 0 73.4 80" aria-hidden="true"><path d="M4.00,76.00 L4.00,4.00 L19.41,4.00 L19.41,76.00 L4.00,76.00 Z M14.50,38.59 L46.91,4.00 L67.41,4.00 L33.20,38.59 L14.50,38.59 Z M48.50,76.00 L14.30,38.59 L33.20,38.59 L69.41,76.00 L48.50,76.00 Z" fill="#fff"/></svg></span>
    </div>
    <div class="splash-strapline">Studio · Community · Ritual</div>
    <div class="splash-tagline">Connect. Create. Belong.</div>
    <div class="splash-endorsement">Built by KILN</div>
    <div class="splash-hint">Tap anywhere to continue</div>
  </div>

  <div id="app-root">
    <div class="skel-header"></div>
    <div class="skel-block"></div>
    <div class="skel-block"></div>
    <div class="skel-block"></div>
  </div>
  <div id="a2hs-banner"></div>

  <!-- Design Preview: photograph your real piece, preview colours directly on it -->
  <div id="design-preview-screen">
    <div class="dp-header">
      <span class="dp-title">Design Preview</span>
      <button onclick="closeDesignPreview()">✕ Close</button>
    </div>

    <div class="dp-canvas-area" id="dp-canvas-area">
      <div id="dp-photo-prompt">
        <div style="font-size: 40px; margin-bottom: 8px;">📷</div>
        <div style="font-size: 15px; line-height: 1.5;">Take a photo of your piece, then preview colours right on it.</div>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap;">
          <button onclick="document.getElementById('dp-photo-input-camera').click()">📷 Take Photo</button>
          <button onclick="document.getElementById('dp-photo-input-library').click()" style="background: rgba(255,255,255,0.15); color: #fff;">🖼️ Choose from Photos</button>
        </div>
        <input type="file" id="dp-photo-input-camera" accept="image/*" capture="environment" style="display:none;" onchange="handleDesignPhotoCapture(event)">
        <input type="file" id="dp-photo-input-library" accept="image/*" style="display:none;" onchange="handleDesignPhotoCapture(event)">
      </div>
      <div class="dp-canvas-stack" id="dp-canvas-stack">
        <canvas id="dp-base-canvas"></canvas>
        <canvas id="dp-paint-canvas"></canvas>
      </div>
    </div>

    <div class="dp-toolbar">
      <div class="dp-tool-row">
        <div class="dp-tool-btn active" id="dp-tool-brush" onclick="setDpTool('brush')"><span class="dp-tool-icon">🖌️</span>Brush</div>
        <div class="dp-tool-btn" id="dp-tool-fill" onclick="setDpTool('fill')"><span class="dp-tool-icon">🪣</span>Fill area</div>
        <div class="dp-tool-btn" id="dp-tool-sticker" onclick="setDpTool('sticker')"><span class="dp-tool-icon">⭐</span>Colour sticker</div>
      </div>

      <div class="dp-sub-row" id="dp-brush-controls">
        <label>Brush</label>
        <div class="dp-brush-sizes">
          <div class="dp-brush-size-btn" data-size="10" onclick="setDpBrushSize(10, this)"><div class="dot" style="width:6px;height:6px;"></div></div>
          <div class="dp-brush-size-btn active" data-size="22" onclick="setDpBrushSize(22, this)"><div class="dot" style="width:12px;height:12px;"></div></div>
          <div class="dp-brush-size-btn" data-size="38" onclick="setDpBrushSize(38, this)"><div class="dot" style="width:20px;height:20px;"></div></div>
        </div>
        <label>Opacity</label>
        <input type="range" id="dp-opacity" min="20" max="90" value="55" oninput="setDpOpacity(this.value)">
      </div>

      <div class="dp-palette" id="dp-palette"></div>

      <div class="dp-actions">
        <button onclick="dpUndo()">↩️ Undo</button>
        <button onclick="dpClear()">🗑️ Clear All</button>
        <button onclick="document.getElementById('dp-photo-input-camera').click()">📷 Retake</button>
        <button onclick="document.getElementById('dp-photo-input-library').click()">🖼️ New Photo</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    // The Kiln Cafe studio id (pilot). White-label studios would inject their own.
    const STUDIO_ID = 'fab8b2d2-27b5-47ec-8c56-268bbf821dc3';

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    const logoSvg = `<svg viewBox="0 0 241 98" style="height:0.85em; width:auto; display:block;" aria-hidden="true">
      <path d="M5.00,82.00 L5.00,10.00 L20.41,10.00 L20.41,82.00 L5.00,82.00 Z M12.20,82.00 L12.20,70.20 L55.00,70.20 L55.00,82.00 L12.20,82.00 Z" fill="#fff"/>
      <path d="M64.00,82.00 L64.00,10.00 L79.41,10.00 L79.41,82.00 L64.00,82.00 Z" fill="#fff"/>
      <path d="M 101.41,82.00 L 107.41,82.00 L 107.41,40.00 C 107.41,20.00 115.41,12.00 125.41,12.00 C 135.41,12.00 143.41,20.00 143.41,40.00 L 143.41,82.00 L 149.41,82.00" fill="none" stroke="#B87946" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M165.41,82.00 L165.41,10.00 L180.81,10.00 L180.81,82.00 L165.41,82.00 Z M175.91,44.59 L208.31,10.00 L228.81,10.00 L194.61,44.59 L175.91,44.59 Z M209.91,82.00 L175.70,44.59 L194.61,44.59 L230.81,82.00 L209.91,82.00 Z" fill="#fff"/>
    </svg>`;

    async function init() {
      const bookingCode = getParam('booking');
      const root = document.getElementById('app-root');

      if (!bookingCode) {
        root.innerHTML = `
          <div class="error-state">
            <h2>Welcome to The Kiln Cafe</h2>
            <p>Scan the QR code on your table to open your painting session.</p>
          </div>`;
        return;
      }

      try {
        const res = await fetch(`${API_URL}/api/booking/${bookingCode}?studioId=${STUDIO_ID}`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        renderSession(data);
        showA2HSBanner();
      } catch (err) {
        root.innerHTML = `
          <div class="error-state">
            <h2>Session not found</h2>
            <p>We couldn't find this booking. Please ask a member of staff for help.</p>
          </div>`;
      }
    }

    function renderSession(data) {
      const b = data.booking || {};
      const hist = data.customerHistory || {};
      const firstName = (b.customerName || 'there').split(' ')[0];

      // Keep booking details available globally so the persistent QR badge
      // can be shown full-size from any screen, at any time
      window.currentBooking = { code: getParam('booking'), name: b.customerName || firstName };

      const readyPieces = data.piecesReadyForPickup || [];
      const readyBanner = readyPieces.length > 0
        ? `<div class="info-card" style="background: linear-gradient(180deg, #f2f8f0, #e9f3e4); border-color: var(--glaze-sage-base);">
             <div style="font-family: var(--gu-font-display); font-weight: 700; color: var(--glaze-sage-deep); font-size: 16px; margin-bottom: 4px;">🎉 Ready for collection!</div>
             <div style="font-size: 13px; color: var(--gu-accent);">${readyPieces.length} piece${readyPieces.length > 1 ? 's are' : ' is'} fired and waiting for you at the studio.</div>
           </div>` : '';

      const unfinished = (hist.unfinishedPieces && hist.unfinishedPieces.length)
        ? `<div class="section-label">Your unfinished pieces</div>
           <div class="info-card">
             ${hist.unfinishedPieces.map(p => `<div class="row"><span class="k">${p.piece_type || 'Piece'}</span><span class="v">Waiting for you</span></div>`).join('')}
           </div>` : '';

      const loyalty = (hist.loyaltyPoints != null)
        ? `<div class="info-card"><div class="row"><span class="k">⭐ Loyalty points</span><span class="v">${hist.loyaltyPoints}</span></div></div>` : '';

      const qrThumbUrl = `https://api.qrserver.com/v1/create-qr-code/?size=90x90&margin=4&data=${encodeURIComponent(window.location.href)}`;

      document.getElementById('app-root').innerHTML = `
        <div class="app-header">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div class="brand">${logoSvg} <span style="opacity:0.65; font-weight:400;">· The Kiln Cafe</span></div>
            <button onclick="showMyQR()" style="background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.5); border-radius:12px; padding:4px; cursor:pointer;" aria-label="Show my QR code">
              <img src="${qrThumbUrl}" width="46" height="46" style="display:block; border-radius:6px;" alt="Your QR code">
            </button>
          </div>
          <div class="greeting">Hi ${firstName}! 👋</div>
          <div class="sub">Your painting session is ready. Have fun creating!</div>
        </div>
        <div class="content">
          ${readyBanner}
          ${loyalty}
          ${unfinished}

          <div class="section-label">Getting started</div>

          <button class="tile tile-sage" onclick="window.open('https://www.thekilncafe.com/how-to-video', '_blank')">
            <span class="tile-icon">🎥</span>
            <div class="tile-title">Painting Guide</div>
            <div class="tile-desc">New to painting pottery? Watch our quick how-to before you start.</div>
          </button>

          <div class="section-label">Design tools</div>

          <button class="tile tile-ocean soon">
            <span class="tile-icon">🎨</span>
            <div class="tile-title">Colour Picker</div>
            <div class="tile-desc">Browse the studio's glaze colours and plan your palette.</div>
          </button>

          <button class="tile tile-honey" onclick="openDesignPreview()">
            <span class="tile-icon">🖼️</span>
            <div class="tile-title">Design Preview</div>
            <div class="tile-desc">Photograph your real piece, then preview colours right on it.</div>
          </button>

          <button class="tile tile-oxblood soon">
            <span class="tile-icon">✨</span>
            <div class="tile-title">Transfer Designer</div>
            <div class="tile-desc">Create and position transfers for your piece.</div>
          </button>
        </div>

        <!-- Full-size QR modal, reachable from anywhere via the header badge -->
        <div id="my-qr-modal" style="display:none; position:fixed; inset:0; background:rgba(61,28,18,0.45); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:1000; align-items:center; justify-content:center; padding:20px;" onclick="if(event.target===this) closeMyQR()">
          <div style="background:#fff; border-radius:22px; padding:28px 24px; max-width:320px; width:100%; text-align:center;">
            <div style="font-family:Georgia,serif; font-size:18px; font-weight:700; color:var(--gu-primary); margin-bottom:4px;">Your Session QR</div>
            <div style="font-size:13px; color:var(--gu-dust); margin-bottom:16px;">${window.currentBooking.name}</div>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(window.location.href)}" width="220" height="220" style="display:block; margin:0 auto 16px; border-radius:8px;" alt="Your QR code">
            <div style="font-size:12px; color:var(--gu-dust); line-height:1.5; margin-bottom:18px;">Show this to staff any time so they know which pieces are yours.</div>
            <button onclick="closeMyQR()" style="width:100%; background:var(--glaze-oxblood-base); color:#fff; border:none; padding:12px; border-radius:14px; font-weight:600; cursor:pointer;">Done</button>
          </div>
        </div>`;
    }

    function showMyQR() {
      document.getElementById('my-qr-modal').style.display = 'flex';
    }
    function closeMyQR() {
      document.getElementById('my-qr-modal').style.display = 'none';
    }

    // ── Add to Home Screen: so the customer can get back to THEIR exact booking
    // page anytime, even after fully closing the tab — no email/SMS needed. ──

    let deferredInstallPrompt = null;
    const bookingCodeForA2HS = getParam('booking');
    const dismissKey = bookingCodeForA2HS ? `a2hs_dismissed_${bookingCodeForA2HS}` : null;

    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }
    function isIOS() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent);
    }

    function showA2HSBanner() {
      if (!bookingCodeForA2HS) return; // nothing to save without a booking
      if (isStandalone()) return; // already installed
      if (dismissKey && localStorage.getItem(dismissKey)) return; // already dismissed for this booking

      const banner = document.getElementById('a2hs-banner');

      if (isIOS()) {
        banner.innerHTML = `
          <span class="a2hs-icon">📲</span>
          <span class="a2hs-text">Save this page so you can check back anytime: tap <b>Share</b> then <b>"Add to Home Screen."</b></span>
          <button class="a2hs-dismiss" onclick="dismissA2HS()">Got it</button>`;
      } else if (deferredInstallPrompt) {
        banner.innerHTML = `
          <span class="a2hs-icon">📲</span>
          <span class="a2hs-text">Save this page to your home screen so you can check back anytime.</span>
          <button class="a2hs-install" onclick="triggerInstall()">Add</button>
          <button class="a2hs-dismiss" onclick="dismissA2HS()">✕</button>`;
      } else {
        // Android/other without a native prompt available yet — generic hint
        banner.innerHTML = `
          <span class="a2hs-icon">📲</span>
          <span class="a2hs-text">Bookmark this page or add it to your home screen so you can check back anytime.</span>
          <button class="a2hs-dismiss" onclick="dismissA2HS()">Got it</button>`;
      }

      banner.style.display = 'flex';
    }

    function dismissA2HS() {
      document.getElementById('a2hs-banner').style.display = 'none';
      if (dismissKey) localStorage.setItem(dismissKey, '1');
    }

    async function triggerInstall() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      dismissA2HS();
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
    });

    // ══════════════════════════════════════════════════════════
    // DESIGN PREVIEW: photograph the real piece, preview colours on it
    // ══════════════════════════════════════════════════════════

    // Starter palette — common Stroke & Coat shades. PLACEHOLDER: swap for
    // the studio's exact confirmed-in-stock colours when known.
    const DP_PALETTE = [
      { name: 'Really Red', hex: '#c0392b' },
      { name: 'Orange You Glad', hex: '#e07a2c' },
      { name: 'Lemon Yellow', hex: '#f0d64a' },
      { name: 'Kiwi', hex: '#8bb83c' },
      { name: 'Forest Green', hex: '#2f6b3a' },
      { name: 'Turquoise Delight', hex: '#2fa89a' },
      { name: 'True Blue', hex: '#2c5fa8' },
      { name: 'Blue Bayou', hex: '#1d3d6b' },
      { name: 'Purple Dust', hex: '#7a5ba8' },
      { name: 'Shell Pink', hex: '#e8a3b0' },
      { name: 'Chocolate Brown', hex: '#5a3825' },
      { name: 'Coal', hex: '#2a2a2a' },
      { name: 'Cotton Tail', hex: '#f5f0e6' },
      { name: 'Silver Lining', hex: '#a8a8a8' }
    ];

    let dpTool = 'brush';
    let dpBrushSize = 22;
    let dpOpacity = 0.55;
    let dpColor = DP_PALETTE[0].hex;
    let dpBaseCtx, dpPaintCtx;
    let dpDrawing = false;
    let dpLastPoint = null;
    let dpUndoStack = [];
    let dpStickerCounter = 0;

    function openDesignPreview() {
      const screen = document.getElementById('design-preview-screen');
      screen.style.display = 'flex';
      void screen.offsetWidth; // force reflow so the transition actually plays
      screen.classList.add('open');
      if (document.getElementById('dp-palette').children.length === 0) renderDpPalette();
    }
    function closeDesignPreview() {
      const screen = document.getElementById('design-preview-screen');
      screen.classList.remove('open');
      setTimeout(() => { screen.style.display = 'none'; }, 280);
    }

    function renderDpPalette() {
      const el = document.getElementById('dp-palette');
      el.innerHTML = DP_PALETTE.map((c, i) => `
        <div class="dp-swatch ${i === 0 ? 'active' : ''}" style="background:${c.hex};" onclick="selectDpColor('${c.hex}', this)" title="${c.name}"></div>
      `).join('');
    }

    function selectDpColor(hex, el) {
      dpColor = hex;
      document.querySelectorAll('.dp-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    }

    function setDpTool(tool) {
      dpTool = tool;
      document.querySelectorAll('.dp-tool-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`dp-tool-${tool}`).classList.add('active');
      document.getElementById('dp-brush-controls').style.display = (tool === 'brush') ? 'flex' : 'none';
    }

    function setDpBrushSize(size, el) {
      dpBrushSize = size;
      document.querySelectorAll('.dp-brush-size-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function setDpOpacity(val) {
      dpOpacity = val / 100;
    }

    function handleDesignPhotoCapture(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          setupDpCanvases(img);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function setupDpCanvases(img) {
      const area = document.getElementById('dp-canvas-area');
      const stack = document.getElementById('dp-canvas-stack');
      const maxW = area.clientWidth;
      const maxH = area.clientHeight;
      const scale = Math.min(maxW / img.width, maxH / img.height, 1);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);

      const baseCanvas = document.getElementById('dp-base-canvas');
      const paintCanvas = document.getElementById('dp-paint-canvas');
      baseCanvas.width = w; baseCanvas.height = h;
      paintCanvas.width = w; paintCanvas.height = h;
      stack.style.width = w + 'px';
      stack.style.height = h + 'px';

      dpBaseCtx = baseCanvas.getContext('2d');
      dpPaintCtx = paintCanvas.getContext('2d');
      dpBaseCtx.drawImage(img, 0, 0, w, h);
      dpPaintCtx.clearRect(0, 0, w, h);
      dpUndoStack = [];

      document.getElementById('dp-photo-prompt').style.display = 'none';
      stack.style.display = 'block';

      wireDpPointerEvents(paintCanvas);
    }

    function dpSaveUndoState() {
      dpUndoStack.push(dpPaintCtx.getImageData(0, 0, dpPaintCtx.canvas.width, dpPaintCtx.canvas.height));
      if (dpUndoStack.length > 20) dpUndoStack.shift();
    }

    function dpUndo() {
      if (dpUndoStack.length === 0) return;
      const prev = dpUndoStack.pop();
      dpPaintCtx.putImageData(prev, 0, 0);
    }

    function dpClear() {
      if (!dpPaintCtx) return;
      dpSaveUndoState();
      dpPaintCtx.clearRect(0, 0, dpPaintCtx.canvas.width, dpPaintCtx.canvas.height);
      document.querySelectorAll('.dp-sticker').forEach(s => s.remove());
    }

    function getCanvasPoint(canvas, evt) {
      const rect = canvas.getBoundingClientRect();
      const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
      const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function wireDpPointerEvents(canvas) {
      const start = (evt) => {
        evt.preventDefault();
        const pt = getCanvasPoint(canvas, evt);

        if (dpTool === 'brush') {
          dpSaveUndoState();
          dpDrawing = true;
          dpLastPoint = pt;
          dpPaintDot(pt);
        } else if (dpTool === 'fill') {
          dpSaveUndoState();
          dpFloodFill(pt);
        } else if (dpTool === 'sticker') {
          addDpSticker(pt);
        }
      };
      const move = (evt) => {
        if (!dpDrawing || dpTool !== 'brush') return;
        evt.preventDefault();
        const pt = getCanvasPoint(canvas, evt);
        dpPaintLine(dpLastPoint, pt);
        dpLastPoint = pt;
      };
      const end = () => { dpDrawing = false; dpLastPoint = null; };

      canvas.addEventListener('mousedown', start);
      canvas.addEventListener('mousemove', move);
      window.addEventListener('mouseup', end);
      canvas.addEventListener('touchstart', start, { passive: false });
      canvas.addEventListener('touchmove', move, { passive: false });
      canvas.addEventListener('touchend', end);
    }

    function dpPaintDot(pt) {
      dpPaintCtx.globalAlpha = dpOpacity;
      dpPaintCtx.fillStyle = dpColor;
      dpPaintCtx.beginPath();
      dpPaintCtx.arc(pt.x, pt.y, dpBrushSize / 2, 0, Math.PI * 2);
      dpPaintCtx.fill();
    }

    function dpPaintLine(from, to) {
      dpPaintCtx.globalAlpha = dpOpacity;
      dpPaintCtx.strokeStyle = dpColor;
      dpPaintCtx.lineWidth = dpBrushSize;
      dpPaintCtx.lineCap = 'round';
      dpPaintCtx.lineJoin = 'round';
      dpPaintCtx.beginPath();
      dpPaintCtx.moveTo(from.x, from.y);
      dpPaintCtx.lineTo(to.x, to.y);
      dpPaintCtx.stroke();
    }

    // Flood fill: samples the ORIGINAL photo (base canvas) to decide which
    // pixels belong to the tapped region, but paints the result onto the
    // paint layer — so the photo itself is never altered and repeated fills
    // stay based on the real photo, not previous paint.
    function dpFloodFill(startPt) {
      const w = dpBaseCtx.canvas.width, h = dpBaseCtx.canvas.height;
      const baseData = dpBaseCtx.getImageData(0, 0, w, h).data;
      const paintData = dpPaintCtx.getImageData(0, 0, w, h);

      const startX = Math.floor(startPt.x), startY = Math.floor(startPt.y);
      if (startX < 0 || startY < 0 || startX >= w || startY >= h) return;

      const idx = (x, y) => (y * w + x) * 4;
      const startIdx = idx(startX, startY);
      const targetR = baseData[startIdx], targetG = baseData[startIdx + 1], targetB = baseData[startIdx + 2];
      const tolerance = 42;

      const fillRgb = hexToRgb(dpColor);
      const fillAlpha = Math.round(dpOpacity * 255);

      const visited = new Uint8Array(w * h);
      const stack = [[startX, startY]];

      while (stack.length) {
        const [x, y] = stack.pop();
        if (x < 0 || y < 0 || x >= w || y >= h) continue;
        const pos = y * w + x;
        if (visited[pos]) continue;

        const i = pos * 4;
        const dr = baseData[i] - targetR, dg = baseData[i + 1] - targetG, db = baseData[i + 2] - targetB;
        const dist = Math.sqrt(dr * dr + dg * dg + db * db);
        if (dist > tolerance) continue;

        visited[pos] = 1;

        // Blend the fill colour onto the existing paint pixel (simple alpha blend)
        const pi = pos * 4;
        const existingAlpha = paintData.data[pi + 3] / 255;
        const outAlpha = fillAlpha / 255 + existingAlpha * (1 - fillAlpha / 255);
        if (outAlpha > 0) {
          paintData.data[pi] = Math.round((fillRgb.r * (fillAlpha / 255) + paintData.data[pi] * existingAlpha * (1 - fillAlpha / 255)) / outAlpha);
          paintData.data[pi + 1] = Math.round((fillRgb.g * (fillAlpha / 255) + paintData.data[pi + 1] * existingAlpha * (1 - fillAlpha / 255)) / outAlpha);
          paintData.data[pi + 2] = Math.round((fillRgb.b * (fillAlpha / 255) + paintData.data[pi + 2] * existingAlpha * (1 - fillAlpha / 255)) / outAlpha);
        }
        paintData.data[pi + 3] = Math.round(outAlpha * 255);

        stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
      }

      dpPaintCtx.putImageData(paintData, 0, 0);
    }

    function hexToRgb(hex) {
      const v = parseInt(hex.slice(1), 16);
      return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
    }

    // Draggable, resizable colour "sticker" — a simple translucent overlay
    // shape the customer can position and resize over the photo by hand
    function addDpSticker(pt) {
      dpStickerCounter++;
      const stack = document.getElementById('dp-canvas-stack');
      const size = 70;

      const sticker = document.createElement('div');
      sticker.className = 'dp-sticker';
      sticker.style.width = size + 'px';
      sticker.style.height = size + 'px';
      sticker.style.left = (pt.x - size / 2) + 'px';
      sticker.style.top = (pt.y - size / 2) + 'px';
      sticker.style.background = dpColor;
      sticker.dataset.id = dpStickerCounter;

      const removeBtn = document.createElement('div');
      removeBtn.className = 'dp-sticker-remove';
      removeBtn.textContent = '✕';
      removeBtn.onclick = (e) => { e.stopPropagation(); sticker.remove(); };
      sticker.appendChild(removeBtn);

      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'dp-sticker-resize';
      sticker.appendChild(resizeHandle);

      makeDpStickerInteractive(sticker, resizeHandle);
      stack.appendChild(sticker);
    }

    function makeDpStickerInteractive(sticker, resizeHandle) {
      let dragging = false, resizing = false;
      let startX, startY, startLeft, startTop, startW, startH;

      function getXY(evt) {
        return evt.touches ? { x: evt.touches[0].clientX, y: evt.touches[0].clientY } : { x: evt.clientX, y: evt.clientY };
      }

      sticker.addEventListener('mousedown', (e) => { if (e.target === resizeHandle) return; startDrag(e); });
      sticker.addEventListener('touchstart', (e) => { if (e.target === resizeHandle) return; startDrag(e); }, { passive: false });
      resizeHandle.addEventListener('mousedown', startResize);
      resizeHandle.addEventListener('touchstart', startResize, { passive: false });

      function startDrag(e) {
        e.preventDefault(); e.stopPropagation();
        dragging = true;
        const p = getXY(e);
        startX = p.x; startY = p.y;
        startLeft = parseFloat(sticker.style.left);
        startTop = parseFloat(sticker.style.top);
      }
      function startResize(e) {
        e.preventDefault(); e.stopPropagation();
        resizing = true;
        const p = getXY(e);
        startX = p.x; startY = p.y;
        startW = sticker.offsetWidth; startH = sticker.offsetHeight;
      }
      function move(e) {
        if (!dragging && !resizing) return;
        const p = getXY(e);
        if (dragging) {
          sticker.style.left = (startLeft + (p.x - startX)) + 'px';
          sticker.style.top = (startTop + (p.y - startY)) + 'px';
        } else if (resizing) {
          const newSize = Math.max(24, startW + (p.x - startX));
          sticker.style.width = newSize + 'px';
          sticker.style.height = newSize + 'px';
        }
      }
      function end() { dragging = false; resizing = false; }

      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', end);
      window.addEventListener('touchmove', move, { passive: false });
      window.addEventListener('touchend', end);
    }

    // ── Splash screen: shown on open, AND as a "resting" state whenever the
    // app goes idle for a while — so a shared/left-open session settles back
    // to the branded moment, with the animation genuinely replaying each
    // time (not just re-shown statically). Re-inserting a fresh copy of the
    // splash markup is the simplest reliable way to restart CSS animations. ──
    const splashTemplate = document.getElementById('splash-screen').outerHTML;
    let splashDismissed = false;

    function wireSplash() {
      const el = document.getElementById('splash-screen');
      if (el) el.addEventListener('click', dismissSplash);
      setTimeout(drawSplashArrows, 1500); // wait for letters to actually land first
    }

    // Animated arrow motif (splash only) — traces K, over the kiln, to I,
    // to L, then dips back into the kiln for a final stop. Positions are
    // measured from the REAL rendered letters (not hand-guessed coordinates)
    // so it lines up exactly regardless of layout.
    function drawSplashArrows() {
      const wordEl = document.querySelector('.splash-word');
      if (!wordEl) return;
      const kids = wordEl.children; // [L, I, n-flip-stage(arch), K]
      if (kids.length < 4) return;

      const wordRect = wordEl.getBoundingClientRect();
      const pt = (el, xFrac, yEdge) => {
        const r = el.getBoundingClientRect();
        return {
          x: (r.left - wordRect.left) + r.width * xFrac,
          y: (r[yEdge] - wordRect.top)
        };
      };

      const lTop = pt(kids[0], 0.5, 'top');
      const lBottom = pt(kids[0], 0.5, 'bottom');
      const iTop = pt(kids[1], 0.5, 'top');
      const archTop = pt(kids[2], 0.5, 'top');
      const archRect = kids[2].getBoundingClientRect();
      const archEntry = {
        x: (archRect.left - wordRect.left) + archRect.width * 0.5,
        y: (archRect.bottom - wordRect.top) - archRect.height * 0.28
      };
      const kTop = pt(kids[3], 0.45, 'top');

      const svgNS = 'http://www.w3.org/2000/svg';
      const overlay = document.createElementNS(svgNS, 'svg');
      overlay.id = 'splash-arrow-overlay';
      overlay.setAttribute('viewBox', `0 0 ${wordRect.width} ${wordRect.height}`);
      overlay.style.width = wordRect.width + 'px';
      overlay.style.height = wordRect.height + 'px';
      overlay.style.top = '0';
      overlay.style.left = '0';

      const defs = document.createElementNS(svgNS, 'defs');
      const marker = document.createElementNS(svgNS, 'marker');
      marker.id = 'splashArrowhead';
      marker.setAttribute('markerWidth', '8');
      marker.setAttribute('markerHeight', '8');
      marker.setAttribute('refX', '4');
      marker.setAttribute('refY', '4');
      marker.setAttribute('orient', 'auto');
      const arrowShape = document.createElementNS(svgNS, 'path');
      arrowShape.setAttribute('d', 'M0,0 L8,4 L0,8 Z');
      arrowShape.setAttribute('fill', '#B87946');
      marker.appendChild(arrowShape);
      defs.appendChild(marker);
      overlay.appendChild(defs);

      const arcAbove = (from, to, liftAbove) => {
        const midY = Math.min(from.y, to.y) - liftAbove;
        return `M ${from.x},${from.y} C ${from.x},${midY} ${to.x},${midY} ${to.x},${to.y}`;
      };
      const dipBelow = (from, to, dropBelow) => {
        const midY = Math.max(from.y, to.y) + dropBelow;
        return `M ${from.x},${from.y} C ${from.x},${midY} ${to.x},${midY} ${to.x},${to.y}`;
      };

      const pathDefs = [
        arcAbove(kTop, iTop, wordRect.height * 0.55),   // K -> over the kiln -> I
        arcAbove(iTop, lTop, wordRect.height * 0.28),   // I -> L
        dipBelow(lBottom, archEntry, wordRect.height * 0.35) // L -> into the kiln, final stop
      ];

      const paths = pathDefs.map(d => {
        const p = document.createElementNS(svgNS, 'path');
        p.setAttribute('d', d);
        p.setAttribute('class', 'splash-arrow-path');
        p.setAttribute('marker-end', 'url(#splashArrowhead)');
        overlay.appendChild(p);
        const len = p.getTotalLength();
        p.style.setProperty('--len', len);
        p.style.strokeDasharray = len;
        p.style.strokeDashoffset = len;
        return p;
      });

      // Small flame above the kiln, shown once the arrows finish
      const flame = document.createElementNS(svgNS, 'g');
      flame.setAttribute('class', 'splash-flame');
      flame.setAttribute('transform', `translate(${archTop.x - 12}, ${archTop.y - 30})`);
      const flamePath = document.createElementNS(svgNS, 'path');
      flamePath.setAttribute('d', 'M12,26 C5,18 7,8 12,2 C14,9 18,11 17,18 C22,15 23,9 20,4 C27,10 27,20 19,26 C23,24 25,20 25,15 C28,21 25,27 19,29 C11,31 8,26 12,26 Z');
      flamePath.setAttribute('fill', '#E8874A');
      flame.appendChild(flamePath);
      overlay.appendChild(flame);

      wordEl.appendChild(overlay);

      // Sequence: arrow 1, arrow 2, arrow 3, then the flame
      setTimeout(() => paths[0].classList.add('drawing'), 2700);
      setTimeout(() => paths[1].classList.add('drawing'), 3700);
      setTimeout(() => paths[2].classList.add('drawing'), 4400);
      setTimeout(() => flame.classList.add('showing'), 5300);
    }

    function dismissSplash() {
      if (splashDismissed) return;
      splashDismissed = true;
      const splash = document.getElementById('splash-screen');
      splash.classList.add('fading-out');
      setTimeout(() => { splash.remove(); }, 600);
    }

    function showSplash() {
      if (document.getElementById('splash-screen')) return; // already showing
      splashDismissed = false;
      document.body.insertAdjacentHTML('afterbegin', splashTemplate);
      wireSplash();
    }

    wireSplash();

    // Idle detection: after a few minutes with no interaction, rest back on the splash
    const IDLE_TIMEOUT_MS = 3 * 60 * 1000; // 3 minutes
    let idleTimer = null;
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(showSplash, IDLE_TIMEOUT_MS);
    }
    ['touchstart', 'mousedown', 'keydown', 'scroll'].forEach(evt => {
      document.addEventListener(evt, resetIdleTimer, { passive: true });
    });
    resetIdleTimer();

    init();
  </script>

</body>
</html>
