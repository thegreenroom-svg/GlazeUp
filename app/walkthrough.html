<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kilnLINK — App Tour</title>
<style>
  :root { --clay:#B87946; --charcoal:#2B2724; --ivory:#F7F4EE; --sand:#E8D9C4; --stone:#C8BFB2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--charcoal); font-family:'Inter',-apple-system,system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; color:white; }
  .wt-header { background:#1a1612; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .wt-logo { font-size:18px; font-weight:700; }
  .wt-logo span { color:var(--clay); font-weight:400; }
  .wt-close { background:rgba(255,255,255,0.12); border:none; color:white; border-radius:20px; padding:7px 16px; font-size:13px; cursor:pointer; }
  .wt-progress-bar { height:3px; background:rgba(255,255,255,0.15); flex-shrink:0; }
  .wt-progress-fill { height:100%; background:var(--clay); transition:width 0.4s ease; }
  .wt-info { padding:12px 20px 8px; flex-shrink:0; }
  .wt-step-label { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--clay); font-weight:600; margin-bottom:4px; }
  .wt-title { font-size:17px; font-weight:700; line-height:1.25; margin-bottom:5px; }
  .wt-body { font-size:13px; color:rgba(255,255,255,0.65); line-height:1.6; }
  .wt-narration { font-size:12px; color:#e8c99a; line-height:1.6; margin-top:7px; padding:8px 12px; background:rgba(184,121,70,0.15); border-left:3px solid var(--clay); border-radius:0 6px 6px 0; display:none; font-style:italic; }
  .wt-screen-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:10px 16px; min-height:0; }
  .wt-screen { width:100%; max-width:400px; }
  .wt-screen svg { width:100%; display:block; border-radius:12px; box-shadow:0 6px 24px rgba(0,0,0,0.4); }
  .wt-controls { padding:10px 20px 16px; display:flex; flex-direction:column; align-items:center; gap:10px; flex-shrink:0; background:#1a1612; }
  .wt-btn-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .wt-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px; padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; }
  .wt-btn-primary { background:var(--clay); border-color:var(--clay); }
  .wt-btn:disabled { opacity:.3; cursor:default; }
  .wt-dots { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
  .wt-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.2); border:none; cursor:pointer; padding:0; transition:all .2s; }
  .wt-dot.active { background:var(--clay); width:20px; border-radius:4px; }

  /* ── Accessibility ── */
  :focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  .wt-btn:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  .wt-dot:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* High contrast / forced colours mode */
  @media (forced-colors: active) {
    .wt-btn { border: 2px solid ButtonText; forced-color-adjust: none; }
    .wt-btn-primary, #btn-voice { background: Highlight; color: HighlightText; border-color: Highlight; }
    .wt-dot.active { background: Highlight; }
    .wt-progress-fill { background: Highlight; }
    .wt-narration { border-left-color: Highlight; color: ButtonText; background: transparent; }
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    .wt-progress-fill { transition: none; }
    .wt-dot { transition: none; }
  }

  /* Large text / zoom support */
  @media (min-width: 1px) {
    .wt-btn { min-height: 44px; min-width: 44px; }
    .wt-dot { min-width: 24px; min-height: 24px; border-radius: 50%; }
    .wt-dot.active { border-radius: 4px; }
  }
</style>
</head>
<body>

<a href="#wt-main-content" class="sr-only" style="position:absolute;top:4px;left:4px;padding:8px 16px;background:#B87946;color:white;border-radius:6px;font-weight:700;font-size:14px;z-index:99999;text-decoration:none;">Skip to content</a>
<div class="wt-header" role="banner">
  <div class="wt-logo" aria-label="kilnLINK App Tour"><span aria-hidden="true">kiln</span><span aria-hidden="true">LINK</span><span class="sr-only">kilnLINK</span> · App Tour</div>
  <button class="wt-close" onclick="history.back()" aria-label="Close walkthrough and go back">✕ Close</button>
</div>
<div class="wt-progress-bar" role="progressbar" aria-valuemin="1" aria-valuemax="100" aria-valuenow="11" aria-label="Tour progress" id="progress-bar"><div class="wt-progress-fill" id="progress"></div></div>

<div class="wt-info" id="wt-main-content">
  <div class="wt-step-label" id="step-label" aria-live="polite" aria-atomic="true">Step 1 of 13</div>
  <h1 class="wt-title" id="step-title" aria-live="assertive" aria-atomic="true"></h1>
  <p class="wt-body" id="step-body" aria-live="polite" aria-atomic="true"></p>
  <p class="wt-narration" id="step-narration" aria-live="polite" aria-label="Narration text"></p>
</div>

<div class="wt-screen-wrap">
  <div class="wt-screen">
    <svg id="main-svg" viewBox="0 0 240 200" role="img" aria-labelledby="svg-title svg-desc"><title id="svg-title">App screen mockup</title><desc id="svg-desc">An annotated illustration of the kilnLINK app screen for this step</desc>
      <g id="screen-content"></g>
      <g id="arrow-layer"></g>
    </svg>
  </div>
</div>

<div class="wt-controls" role="navigation" aria-label="Tour controls">
  <div class="wt-btn-row" role="group" aria-label="Navigation buttons">
    <button class="wt-btn" id="btn-back" onclick="goTo(cur-1)" aria-label="Go to previous step">← Back</button>
    <button class="wt-btn wt-btn-primary" id="btn-play" onclick="togglePlay()" aria-label="Play automatic tour">▶ Play</button>
    <button class="wt-btn" id="btn-next" onclick="goTo(cur+1)" aria-label="Go to next step">Next →</button>
    <button class="wt-btn" id="btn-voice" onclick="toggleVoice()" style="background:#B87946;color:white;border-color:#B87946">🔇 Mute</button>
  </div>
  <div class="wt-dots" id="dots" role="tablist" aria-label="Jump to step"></div>
</div>

<script>
const CLAY='#B87946', CHARCOAL='#2B2724', IVORY='#F7F4EE', SAND='#E8D9C4', STONE='#C8BFB2';
const SAGE='#6b7561', OCEAN='#5b6b68', HONEY='#c9a06b', PURPLE='#1a0a3d', MKTBROWN='#7a4a20';

// ── App header (shared) ──
function appHeader(title) {
  return `
    <rect width="240" height="22" fill="${CHARCOAL}"/>
    <text x="8" y="9" fill="${CLAY}" font-size="6" font-weight="700" font-family="sans-serif">kiln</text>
    <text x="21" y="9.5" fill="white" font-size="7" font-weight="700" font-family="sans-serif">LINK</text>
    <text x="40" y="9.5" fill="rgba(255,255,255,0.5)" font-size="4.5" font-family="sans-serif">· The Kiln Cafe</text>
    ${title ? `<text x="120" y="9.5" fill="rgba(255,255,255,0.9)" font-size="5.5" font-weight="700" font-family="sans-serif" text-anchor="middle">${title}</text>` : ''}
    <text x="232" y="10" fill="rgba(255,255,255,0.5)" font-size="5" font-family="sans-serif">🔔</text>
  `;
}

// ── Home screen ──
function homeScreen() {
  const tiles = [
    { label:'Studio Tablet & Stylus', icon:'📱', color:HONEY, badge:'£3', y:32 },
    { label:'Take It Home', icon:'🏠', color:PURPLE, badge:'£5', y:47, glow:true },
    { label:'Colour Picker', icon:'🎨', color:SAGE, badge:'FREE', y:62 },
    { label:'Design Preview', icon:'🖼️', color:HONEY, badge:'£1', y:77 },
    { label:'Transfer Designer', icon:'✨', color:CLAY, badge:'£1', y:92 },
    { label:'Community', icon:'💬', color:OCEAN, badge:'', y:107 },
    { label:'Design Marketplace', icon:'🎨', color:MKTBROWN, badge:'NEW', y:122 },
    { label:'My Bookings', icon:'📅', color:'#5b5048', badge:'', y:137 },
    { label:'Painting Guide', icon:'🎥', color:'#4a6b5b', badge:'', y:152 },
  ];
  return `
    <rect width="240" height="200" fill="${IVORY}"/>
    ${appHeader('')}
    <!-- Welcome card -->
    <rect x="8" y="24" width="224" height="7" rx="2" fill="${SAND}"/>
    <text x="12" y="28.5" fill="${CHARCOAL}" font-size="3.5" font-weight="700" font-family="sans-serif">Welcome back, Sarah 🎨 — your session is open</text>
    <!-- Section label -->
    <text x="8" y="37" fill="#8a8175" font-size="3" font-weight="700" font-family="sans-serif" letter-spacing="0.06em">GETTING STARTED</text>
    ${tiles.map(t => `
      <rect x="8" y="${t.y}" width="224" height="13" rx="3" fill="${t.color}"/>
      <text x="14" y="${t.y+8.5}" fill="white" font-size="6" font-family="sans-serif">${t.icon}</text>
      <text x="24" y="${t.y+8.5}" fill="white" font-size="4" font-weight="600" font-family="sans-serif">${t.label}</text>
      ${t.badge ? `<rect x="218" y="${t.y+3}" width="${t.badge.length*3+4}" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/><text x="${220+t.badge.length*1.5}" y="${t.y+8}" fill="white" font-size="3.2" font-weight="700" font-family="sans-serif" text-anchor="middle">${t.badge}</text>` : ''}
    `).join('')}
    <!-- Tour button -->
    <rect x="186" y="189" width="46" height="9" rx="4.5" fill="${CHARCOAL}"/>
    <text x="209" y="194.5" fill="white" font-size="3.5" font-weight="700" font-family="sans-serif" text-anchor="middle">🎯 App Tour</text>
  `;
}

// ── Colour picker screen ──
function colourPickerScreen() {
  const colours = [
    '#c0392b','#e74c3c','#e67e22','#f39c12','#f1c40f','#2ecc71',
    '#27ae60','#1abc9c','#3498db','#2980b9','#9b59b6','#8e44ad',
    '#e91e63','#ff5722','#795548','#607d8b','#2c3e50','#B87946',
    '#ffffff','#ecf0f1','#bdc3c7','#95a5a6','#7f8c8d','#2c3e50',
  ];
  return `
    <rect width="240" height="200" fill="${CHARCOAL}"/>
    ${appHeader('Mayco Colour Picker')}
    <text x="8" y="30" fill="rgba(255,255,255,0.6)" font-size="3.5" font-family="sans-serif">Browse all 82 real Mayco Stroke &amp; Coat® colours</text>
    <!-- Search bar -->
    <rect x="8" y="33" width="224" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="14" y="39.5" fill="rgba(255,255,255,0.4)" font-size="4" font-family="sans-serif">🔍 Search colours…</text>
    <!-- Category tabs -->
    <rect x="8" y="46" width="30" height="7" rx="3" fill="${CLAY}"/>
    <text x="23" y="51" fill="white" font-size="3.5" font-weight="700" font-family="sans-serif" text-anchor="middle">All</text>
    <rect x="41" y="46" width="34" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="58" y="51" fill="rgba(255,255,255,0.6)" font-size="3.5" font-family="sans-serif" text-anchor="middle">Reds</text>
    <rect x="78" y="46" width="36" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="96" y="51" fill="rgba(255,255,255,0.6)" font-size="3.5" font-family="sans-serif" text-anchor="middle">Blues</text>
    <rect x="117" y="46" width="38" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="136" y="51" fill="rgba(255,255,255,0.6)" font-size="3.5" font-family="sans-serif" text-anchor="middle">Greens</text>
    <!-- Colour swatches grid -->
    ${colours.map((c,i) => {
      const col = i % 6, row = Math.floor(i / 6);
      const x = 8 + col * 38, y = 57 + row * 34;
      return `
        <rect x="${x}" y="${y}" width="32" height="28" rx="3" fill="${c}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        <text x="${x+16}" y="${y+33}" fill="rgba(255,255,255,0.5)" font-size="2.8" font-family="sans-serif" text-anchor="middle">SC-${10+i*3}</text>

    <!-- My palette strip -->

    ${['#c0392b','#3498db','#2ecc71','#B87946','#9b59b6'].map((c,i) =>
      `<circle cx="${80+i*18}" cy="192" r="5" fill="${c}" stroke="white" stroke-width="0.5"/>`
    ).join('')}
  `;
}

// ── Design Preview screen ──
function designPreviewScreen() {

    <!-- Toolbar -->

    <!-- Tool tabs -->
    <rect x="4" y="129" width="36" height="10" rx="3" fill="${CLAY}"/>
    <text x="22" y="135.5" fill="white" font-size="4" font-weight="700" font-family="sans-serif" text-anchor="middle">🖌 Brush</text>
    <rect x="43" y="129" width="30" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="58" y="135.5" fill="white" font-size="4" font-family="sans-serif" text-anchor="middle">🪣 Fill</text>
    <rect x="76" y="129" width="32" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="92" y="135.5" fill="white" font-size="4" font-family="sans-serif" text-anchor="middle">⭐ Sticker</text>
    <rect x="111" y="129" width="30" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="126" y="135.5" fill="white" font-size="4" font-family="sans-serif" text-anchor="middle">💾 Save</text>
    <!-- Brush size -->
    <text x="6" y="148" fill="rgba(255,255,255,0.5)" font-size="3.5" font-family="sans-serif">Brush size:</text>

    <!-- Colour swatches -->
    ${['#c0392b','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e91e63','#B87946','#ffffff','#2c3e50'].map((c,i) =>
      `<circle cx="${8+i*22}" cy="159" r="8" fill="${c}" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>`
    ).join('')}
    <!-- Action buttons -->
    <rect x="4" y="171" width="112" height="10" rx="3" fill="${CLAY}"/>

    <rect x="120" y="171" width="116" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>

    <!-- Saved designs -->

    <text x="8" y="189.5" fill="rgba(255,255,255,0.4)" font-size="3.5" font-family="sans-serif">📂 Saved Designs (2)</text>
    ${[0,1].map(i=>`<rect x="${100+i*26}" y="183" width="22" height="14" rx="2" fill="${['#8B6B4A','#5b6b68'][i]}" opacity="0.8"/>`).join('')}

// ── Transfer Designer screen ──

      `<circle cx="${8+i*22}" cy="155" r="7" fill="${c}" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>`

// ── Community feed screen ──
function communityScreen() {
  return `
    <rect width="240" height="200" fill="${CHARCOAL}"/>
    ${appHeader('Community')}
    <!-- Tabs -->
    <rect x="8" y="24" width="58" height="9" rx="3" fill="${CLAY}"/>

// ── Voice ──
let voiceOn = true;

function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Prefer soft female UK English voices — try by name first
  const preferred = [
    'Google UK English Female',
    'Microsoft Sonia Online (Natural) - English (United Kingdom)',
    'Microsoft Libby Online (Natural) - English (United Kingdom)',
    'Karen', 'Moira', 'Samantha', 'Victoria', 'Fiona',
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name === name);
    if (v) return v;
  }
  // Fall back: any female-sounding en-GB voice
  const gbFemale = voices.find(v => v.lang === 'en-GB' && /female|woman|girl/i.test(v.name));
  if (gbFemale) return gbFemale;
  // Any en-GB
  const gb = voices.find(v => v.lang === 'en-GB');
  if (gb) return gb;
  // Any English
  return voices.find(v => v.lang.startsWith('en')) || null;
}

function speak(text, onEnd) {
  if (!window.speechSynthesis || !text) { if (onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.88; utt.pitch = 1.1; utt.lang = 'en-GB';
  const v = getBestVoice();
  if (v) utt.voice = v;
  utt.onstart = () => { const b = document.getElementById('btn-voice'); if (b) b.textContent = '🔊 Speaking…'; };
  utt.onend = () => { const b = document.getElementById('btn-voice'); if (b) b.textContent = '🔇 Mute'; if (onEnd) onEnd(); };
  utt.onerror = () => { if (onEnd) onEnd(); };
  window.speechSynthesis.speak(utt);
}
function stopVoice() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('btn-voice');
  const narEl = document.getElementById('step-narration');
  if (voiceOn) {
    btn.textContent = '🔇 Mute';
    btn.style.background = '#B87946'; btn.style.color = 'white'; btn.style.borderColor = '#B87946';
    narEl.style.display = 'block';
    speak(STEPS[cur].voice);
  } else {
    btn.textContent = '🔊 Unmute';
    btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = '';
    narEl.style.display = 'none';
    stopVoice();
  }
}

// Voices load async in Chrome — retry speaking once they're ready
function initVoice() {
  if (!window.speechSynthesis) return;
  const tryStart = () => {
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      // Voices ready — update button and speak first step
      const btn = document.getElementById('btn-voice');
      if (btn) { btn.textContent = '🔇 Mute'; btn.style.background = '#B87946'; btn.style.color = 'white'; btn.style.borderColor = '#B87946'; }
      document.getElementById('step-narration').style.display = 'block';
      speak(STEPS[0].voice);
    }
  };
  window.speechSynthesis.onvoiceschanged = tryStart;
  // Also try immediately in case already loaded (Firefox/Safari)
  setTimeout(tryStart, 300);
}

// ── Render ──
let cur = 0, playing = false, playTimer = null, bounceAngle = 0;

function render() {
  const step = STEPS[cur];
  document.getElementById('progress').style.width = `${((cur+1)/STEPS.length)*100}%`;
  document.getElementById('step-label').textContent = `Step ${cur+1} of ${STEPS.length}`;
  document.getElementById('step-title').textContent = step.title;
  document.getElementById('step-body').textContent = step.body;
  const narEl = document.getElementById('step-narration');
  narEl.textContent = step.voice;
  narEl.style.display = 'block';
  document.getElementById('screen-content').innerHTML = step.screen();
  document.getElementById('btn-back').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === STEPS.length - 1;
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : cur === STEPS.length - 1 ? '↺ Replay' : '▶ Play';
  document.getElementById('dots').innerHTML = STEPS.map((_,i) =>
    `<button class="wt-dot${i===cur?' active':''}" onclick="goTo(${i})" role="tab" aria-selected="${i===cur}" aria-label="Go to step ${i+1}"></button>`
  ).join('');
  if (voiceOn) speak(step.voice);
  renderArrows();
  if (typeof updateProgressAria !== 'undefined') updateProgressAria();
}

// ── Arrows inside SVG viewBox ──
function renderArrows() {
  const step = STEPS[cur];
  const layer = document.getElementById('arrow-layer');
  layer.innerHTML = '';
  if (!step.arrows.length) return;
  const bounce = Math.sin(bounceAngle) * 3;
  const ns = 'http://www.w3.org/2000/svg';
  step.arrows.forEach(a => {
    const ax = a.vx, ay = a.vy;
    const isUp = a.dir === 'up';
    const g = document.createElementNS(ns, 'g');
    const tipY = isUp ? ay - 8 + bounce : ay + 8 - bounce;
    const pts = isUp
      ? `${ax},${tipY} ${ax-7},${tipY+10} ${ax+7},${tipY+10}`
      : `${ax},${tipY} ${ax-7},${tipY-10} ${ax+7},${tipY-10}`;
    const tri = document.createElementNS(ns, 'polygon');
    tri.setAttribute('points', pts); tri.setAttribute('fill', CLAY);
    g.appendChild(tri);
    const labelY = isUp ? tipY - 12 : tipY + 18;
    const labelW = a.label.length * 2.6 + 10;
    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('x', ax - labelW/2); bg.setAttribute('y', labelY - 7);
    bg.setAttribute('width', labelW); bg.setAttribute('height', 10);
    bg.setAttribute('rx', '5'); bg.setAttribute('fill', CLAY);
    g.appendChild(bg);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', ax); t.setAttribute('y', labelY - 0.5);
    t.setAttribute('fill', 'white'); t.setAttribute('font-size', '5');
    t.setAttribute('font-weight', '700'); t.setAttribute('font-family', 'sans-serif');
    t.setAttribute('text-anchor', 'middle'); t.textContent = a.label;
    g.appendChild(t);
    layer.appendChild(g);
  });
}

function goTo(i) { if (i < 0 || i >= STEPS.length) return; stopVoice(); cur = i; render(); }

function togglePlay() {
  if (cur === STEPS.length - 1 && !playing) cur = 0;
  playing = !playing;
  if (playing) scheduleNext(); else { clearTimeout(playTimer); stopVoice(); }
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
}

function scheduleNext() {
  if (!playing) return;
  if (voiceOn && STEPS[cur].voice) {
    speak(STEPS[cur].voice, () => {
      if (!playing) return;
      setTimeout(() => {
        if (!playing) return;
        if (cur < STEPS.length - 1) { cur++; render(); scheduleNext(); }
        else { playing = false; document.getElementById('btn-play').textContent = '↺ Replay'; }
      }, 800);
    });
  } else {
    playTimer = setTimeout(() => {
      if (!playing) return;
      if (cur < STEPS.length - 1) { cur++; render(); scheduleNext(); }
      else { playing = false; document.getElementById('btn-play').textContent = '↺ Replay'; }
    }, 4000);
  }
}

function animateArrows() { bounceAngle += 0.06; renderArrows(); requestAnimationFrame(animateArrows); }


// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': e.preventDefault(); goTo(cur+1); break;
    case 'ArrowLeft':  case 'ArrowUp':   e.preventDefault(); goTo(cur-1); break;
    case ' ': e.preventDefault(); togglePlay(); break;
    case 'm': case 'M': toggleVoice(); break;
    case 'Home': e.preventDefault(); goTo(0); break;
    case 'End':  e.preventDefault(); goTo(STEPS.length-1); break;
    case 'Escape': history.back(); break;
  }
});

// ── Update ARIA progress bar ──
function updateProgressAria() {
  const bar = document.getElementById('progress-bar');
  if (bar) {
    const pct = Math.round(((cur+1)/STEPS.length)*100);
    bar.setAttribute('aria-valuenow', pct);
    bar.setAttribute('aria-label', `Step ${cur+1} of ${STEPS.length}`);
  }
}

render();
animateArrows();
initVoice();
updateProgressAria();
</script>
