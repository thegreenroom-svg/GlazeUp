<style>

    --dust: #8a8175; --ocean: #5b6b68;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--charcoal); font-family: 'Inter', -apple-system, system-ui, sans-serif; color: white; min-height: 100vh; display: flex; flex-direction: column; }

  .wt-header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .wt-logo { font-size: 22px; font-weight: 700; }
  .wt-logo span { color: var(--clay); font-weight: 400; font-size: 18px; }
  .wt-close { background: rgba(255,255,255,0.12); border: none; color: white; border-radius: 20px; padding: 7px 16px; font-size: 13px; cursor: pointer; }

  .wt-progress-bar { height: 3px; background: rgba(255,255,255,0.15); margin: 14px 20px 0; border-radius: 2px; }
  .wt-progress-fill { height: 100%; background: var(--clay); border-radius: 2px; transition: width 0.4s ease; }

  .wt-step-label { text-align: center; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--clay); font-weight: 600; margin: 10px 0 4px; }

  .wt-title { text-align: center; font-size: 18px; font-weight: 700; padding: 0 24px; line-height: 1.25; }
  .wt-body { text-align: center; font-size: 13px; color: rgba(255,255,255,0.65); padding: 6px 28px 0; line-height: 1.6; min-height: 48px; }

  .wt-screen-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px 16px; position: relative; }

  .wt-phone { width: 200px; height: 400px; flex-shrink: 0; position: relative; }
  .wt-phone svg { width: 100%; height: 100%; }

  .wt-arrow-layer { position: absolute; inset: 0; pointer-events: none; }
  .wt-arrow-layer svg { width: 100%; height: 100%; }

  .wt-controls { padding: 12px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 0; }
  .wt-btn-row { display: flex; gap: 10px; }
  .wt-btn { background: rgba(255,255,255,0.12); border: none; color: white; border-radius: 10px; padding: 11px 22px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .wt-btn-primary { background: var(--clay); }
  .wt-btn:disabled { opacity: 0.35; cursor: default; }

  .wt-dots { display: flex; gap: 5px; }
  .wt-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.25); border: none; cursor: pointer; transition: all 0.2s; padding: 0; }
  .wt-dot.active { background: var(--clay); width: 20px; border-radius: 4px; }

  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .bounce { animation: bounce 1s ease-in-out infinite; }
</style>
</head>

// ── Voice narration ──
function speak(text) {
  if (!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92; utt.pitch = 1.05; utt.lang = 'en-GB';
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
  if (v) utt.voice = v;
  utt.onend = () => {
    const btn = document.getElementById('btn-voice');
    if (btn) btn.textContent = '🔊 Read aloud';
  };
  utt.onstart = () => {
    const btn = document.getElementById('btn-voice');
    if (btn) btn.textContent = '🔊 Speaking…';
  };
  window.speechSynthesis.speak(utt);
}

function stopVoice() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('btn-voice');
  if (voiceOn) {
    btn.style.background = '#B87946';
    btn.style.color = 'white';
    speak(STEPS[cur].voice);
  } else {
    btn.style.background = '';
    btn.style.color = '';
    stopVoice();
  }
}

// Preload voices (Chrome loads them async)
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function render() {
  const step = STEPS[cur];
  document.getElementById('progress').style.width = `${((cur+1)/STEPS.length)*100}%`;
  document.getElementById('step-label').textContent = `Step ${cur+1} of ${STEPS.length}`;
  document.getElementById('step-title').textContent = step.title;
  document.getElementById('step-body').textContent = step.body;
  document.getElementById('screen-content').innerHTML = step.screen();
  document.getElementById('btn-back').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === STEPS.length - 1;
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : cur === STEPS.length-1 ? '↺ Replay' : '▶ Play';

  const dots = document.getElementById('dots');
  dots.innerHTML = STEPS.map((_,i) =>
    `<button class="wt-dot${i===cur?' active':''}" onclick="goTo(${i})" title="Step ${i+1}"></button>`
  ).join('');

  if (voiceOn) speak(step.voice);
  renderArrows();
}

function renderArrows() {
  const step = STEPS[cur];
  if (!step.arrows.length) { document.getElementById('arrow-layer').innerHTML=''; return; }

  // Get phone bounding box to calculate absolute pixel positions
  const phoneSvg = document.getElementById('phone-svg');
  const rect = phoneSvg.getBoundingClientRect();
  const wrapRect = document.querySelector('.wt-screen-wrap').getBoundingClientRect();

  // Phone SVG viewBox is 110x220, screen content starts at x=4,y=9 with 102x207 area
  const scaleX = rect.width / 110;
  const scaleY = rect.height / 220;
  const phoneLeft = rect.left - wrapRect.left;
  const phoneTop = rect.top - wrapRect.top;

  // Content area offset within phone
  const contentOffX = 4, contentOffY = 9;

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('style', 'position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;');

  step.arrows.forEach(a => {
    // Convert screen-space coords to absolute overlay coords
    const ax = phoneLeft + (contentOffX + a.px) * scaleX;
    const ay = phoneTop + (contentOffY + a.py) * scaleY;
    const isUp = a.dir === 'up';
    const bounce = Math.sin(bounceAngle) * 6;
    const arrowTip = isUp ? ay - 14 + bounce : ay + 14 - bounce;
    const labelY = isUp ? ay - 28 : ay + 28;

    const g = document.createElementNS(svgNS, 'g');

    // Label bubble
    const labelW = a.label.length * 7 + 16;
    const rect2 = document.createElementNS(svgNS, 'rect');
    rect2.setAttribute('x', ax - labelW/2); rect2.setAttribute('y', labelY - 11);
    rect2.setAttribute('width', labelW); rect2.setAttribute('height', 16);
    rect2.setAttribute('rx', '8'); rect2.setAttribute('fill', '#B87946');
    g.appendChild(rect2);

    const text = document.createElementNS(svgNS, 'text');
    text.setAttribute('x', ax); text.setAttribute('y', labelY + 1);
    text.setAttribute('fill', 'white'); text.setAttribute('font-size', '11');
    text.setAttribute('font-weight', '700'); text.setAttribute('font-family', 'sans-serif');
    text.setAttribute('text-anchor', 'middle');
    text.textContent = a.label;
    g.appendChild(text);

    // Arrow triangle
    const tri = document.createElementNS(svgNS, 'polygon');
    const tipX = ax, tipY = arrowTip;
    const pts = isUp
      ? `${tipX},${tipY} ${tipX-8},${tipY+14} ${tipX+8},${tipY+14}`
      : `${tipX},${tipY} ${tipX-8},${tipY-14} ${tipX+8},${tipY-14}`;
    tri.setAttribute('points', pts); tri.setAttribute('fill', '#B87946');
    g.appendChild(tri);

    svg.appendChild(g);
  });

  document.getElementById('arrow-layer').innerHTML = '';
  document.getElementById('arrow-layer').appendChild(svg);
}

function goTo(i) {
  if (i < 0 || i >= STEPS.length) return;
  stopVoice();
  cur = i;
  render();
}

function togglePlay() {
  if (cur === STEPS.length - 1 && !playing) { cur = 0; }
  playing = !playing;
  if (playing) scheduleNext();
  else { clearTimeout(playTimer); stopVoice(); }
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
}

function scheduleNext() {
  if (!playing) return;
  playTimer = setTimeout(() => {
    if (cur < STEPS.length - 1) { cur++; render(); scheduleNext(); }
    else { playing = false; document.getElementById('btn-play').textContent = '↺ Replay'; }
  }, 3500);
}

// Bounce animation loop
function animateArrows() {
  bounceAngle += 0.08;
  renderArrows();
  requestAnimationFrame(animateArrows);
}

// Re-render arrows on resize
window.addEventListener('resize', renderArrows);

render();
animateArrows();
</script>
</body>
</html>
