<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kilnLINK — Staff Tour</title>
<style>
  :root { --clay:#B87946; --charcoal:#2B2724; --ivory:#F7F4EE; --sand:#E8D9C4; --stone:#C8BFB2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#f0ebe4; font-family:'Inter',-apple-system,system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; }
  .wt-header { background:var(--charcoal); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .wt-logo { color:white; font-size:18px; font-weight:700; }
  .wt-logo span { color:var(--clay); font-weight:400; }
  .wt-close { background:rgba(255,255,255,0.12); border:none; color:white; border-radius:20px; padding:7px 16px; font-size:13px; cursor:pointer; }
  .wt-progress-bar { height:3px; background:rgba(0,0,0,0.1); }
  .wt-progress-fill { height:100%; background:var(--clay); transition:width 0.4s ease; }
  .wt-info { padding:12px 20px 10px; }
  .wt-step-label { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--clay); font-weight:600; margin-bottom:4px; }
  .wt-title { font-size:17px; font-weight:700; color:var(--charcoal); line-height:1.25; margin-bottom:5px; }
  .wt-body { font-size:13px; color:#6b5f56; line-height:1.6; min-height:44px; }
  .wt-screen-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:10px 16px; position:relative; overflow:hidden; }
  .wt-screen { width:100%; max-width:580px; position:relative; }
  .wt-screen svg.main { width:100%; border-radius:10px; box-shadow:0 4px 20px rgba(43,39,36,0.18); display:block; }
  .wt-arrow-layer { position:absolute; inset:0; pointer-events:none; }
  .wt-arrow-layer svg { width:100%; height:100%; overflow:visible; }
  .wt-controls { padding:12px 20px 18px; display:flex; flex-direction:column; align-items:center; gap:10px; background:white; border-top:1px solid #e0d8d0; }
  .wt-btn-row { display:flex; gap:8px; }
  .wt-btn { background:#f0ebe4; border:1px solid #d0c8c0; color:var(--charcoal); border-radius:8px; padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer; }
  .wt-btn-primary { background:var(--clay); color:white; border-color:var(--clay); }
  .wt-btn:disabled { opacity:.35; cursor:default; }
  .wt-dots { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
  .wt-dot { width:7px; height:7px; border-radius:50%; background:#d0c8c0; border:none; cursor:pointer; padding:0; transition:all .2s; }
  .wt-dot.active { background:var(--clay); width:20px; border-radius:4px; }
</style>
</head>
<body>
<div class="wt-header">
  <div class="wt-logo"><span>kiln</span>LINK Staff Tour</div>
  <button class="wt-close" onclick="history.back()">✕ Close</button>
</div>
<div class="wt-progress-bar"><div class="wt-progress-fill" id="progress"></div></div>
<div class="wt-info">
  <div class="wt-step-label" id="step-label">Step 1 of 11</div>
  <div class="wt-title" id="step-title"></div>
  <div class="wt-body" id="step-body"></div>
</div>
<div class="wt-screen-wrap">
  <div class="wt-screen" id="screen-wrap">
    <svg class="main" id="main-svg" viewBox="0 0 280 180">
      <g id="screen-content"></g>
    </svg>
    <div class="wt-arrow-layer" id="arrow-layer"></div>
  </div>
</div>
<div class="wt-controls">
  <div class="wt-btn-row">
    <button class="wt-btn" id="btn-back" onclick="goTo(cur-1)">← Back</button>
    <button class="wt-btn wt-btn-primary" id="btn-play" onclick="togglePlay()">▶ Play</button>
    <button class="wt-btn" id="btn-next" onclick="goTo(cur+1)">Next →</button>
    <button class="wt-btn" id="btn-voice" onclick="toggleVoice()">🔊 Read aloud</button>
  </div>
  <div class="wt-dots" id="dots"></div>
</div>

<script>
const CLAY='#B87946',CHARCOAL='#2B2724',IVORY='#F7F4EE',SAND='#E8D9C4',STONE='#C8BFB2';

// ── Sidebar SVG (shared across all screens) ──
function sidebar(activeTab) {

    {id:'staff',icon:'👤',label:'Daily Bookings'},
    {id:'community',icon:'🌐',label:'Community'},
    {id:'printqueue',icon:'🖨',label:'Print Queue'},
    {id:'stock',icon:'⊞',label:'Stock'},
    {id:'branding',icon:'✎',label:'Branding'},
    {id:'account',icon:'○',label:'Account'},
  ];
  return `
    <rect width="58" height="180" fill="${CHARCOAL}"/>
    <text x="6" y="12" fill="${CLAY}" font-size="7" font-weight="700" font-family="sans-serif">kiln</text>
    <text x="22" y="13" fill="white" font-size="8" font-weight="700" font-family="sans-serif">LINK</text>
    ${items.map((item,i)=>`
      <rect x="2" y="${24+i*17}" width="54" height="14" rx="3" fill="${activeTab===item.id?CLAY:'transparent'}" opacity="${activeTab===item.id?0.9:1}"/>
      <text x="8" y="${32+i*17}" fill="${activeTab===item.id?'white':'rgba(255,255,255,0.5)'}" font-size="6" font-family="sans-serif">${item.icon}</text>
      <text x="17" y="${32+i*17}" fill="${activeTab===item.id?'white':'rgba(255,255,255,0.5)'}" font-size="5" font-family="sans-serif">${item.label}</text>
    `).join('')}
    <rect x="2" y="165" width="54" height="12" rx="3" fill="rgba(255,255,255,0.08)"/>
    <text x="29" y="172.5" fill="rgba(255,255,255,0.6)" font-size="5" font-family="sans-serif" text-anchor="middle">🎯 Staff Tour</text>
  `;
}

let cur = 0, playing = false, playTimer = null, bounceAngle = 0;
let screenCache = {}, voiceOn = false;

// ── Voice narration ──
function speak(text) {
  if (!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92; utt.pitch = 1.02; utt.lang = 'en-GB';
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
  if (v) utt.voice = v;
  utt.onstart = () => { const b = document.getElementById('btn-voice'); if(b) b.textContent='🔊 Speaking…'; };
  utt.onend = () => { const b = document.getElementById('btn-voice'); if(b) b.textContent='🔊 Read aloud'; };
  window.speechSynthesis.speak(utt);
}
function stopVoice() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }
function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('btn-voice');
  btn.style.background = voiceOn ? '#B87946' : '';
  btn.style.color = voiceOn ? 'white' : '';
  btn.style.borderColor = voiceOn ? '#B87946' : '';
  if (voiceOn) speak(STEPS[cur].voice);
  else stopVoice();
}
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function getScreen(stepIdx) {
  const step = STEPS[stepIdx];
  if (step.screen) return step.screen();
  return screenCache[stepIdx] || dashboardScreen();
}

function render() {
  const step = STEPS[cur];

  document.getElementById('progress').style.width = `${((cur+1)/STEPS.length)*100}%`;
  document.getElementById('step-label').textContent = `Step ${cur+1} of ${STEPS.length}`;
  document.getElementById('step-title').textContent = step.title;
  document.getElementById('step-body').textContent = step.body;

  const content = getScreen(cur);
  screenCache[cur] = content;
  document.getElementById('screen-content').innerHTML = content;

  document.getElementById('btn-back').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === STEPS.length - 1;
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : cur === STEPS.length-1 ? '↺ Replay' : '▶ Play';

  const dots = document.getElementById('dots');
  dots.innerHTML = STEPS.map((_,i) =>
    `<button class="wt-dot${i===cur?' active':''}" onclick="goTo(${i})" title="Step ${i+1}"></button>`
  ).join('');

  if (voiceOn) speak(step.voice);
  renderArrows();
}

function renderArrows() {
  const step = STEPS[cur];
  const layer = document.getElementById('arrow-layer');
  if (!step.arrows.length) { layer.innerHTML = ''; return; }

  const svgEl = document.getElementById('main-svg');
  const svgRect = svgEl.getBoundingClientRect();
  const wrapRect = document.getElementById('screen-wrap').getBoundingClientRect();

  // ViewBox is 280x180
  const scaleX = svgRect.width / 280;
  const scaleY = svgRect.height / 180;
  const offX = svgRect.left - wrapRect.left;
  const offY = svgRect.top - wrapRect.top;

  const bounce = Math.sin(bounceAngle) * 6;
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('style', 'position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;');

  step.arrows.forEach(a => {
    const ax = offX + a.vx * scaleX;
    const ay = offY + a.vy * scaleY;
    const isUp = a.dir === 'up';
    const isRight = a.dir === 'right';

    const arrowTip = isUp ? ay - 12 + bounce : isRight ? ay : ay + 12 - bounce;
    const arrowX = isRight ? ax + 12 - bounce : ax;
    const labelY = isUp ? ay - 26 : isRight ? ay - 8 : ay + 24;
    const labelX = isRight ? ax + 30 : ax;
    const labelW = a.label.length * 6.5 + 16;

    const g = document.createElementNS(ns, 'g');

    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('x', labelX - labelW/2); bg.setAttribute('y', labelY - 10);
    bg.setAttribute('width', labelW); bg.setAttribute('height', 16);
    bg.setAttribute('rx', '8'); bg.setAttribute('fill', CLAY);
    g.appendChild(bg);

    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', labelX); t.setAttribute('y', labelY + 2);
    t.setAttribute('fill', 'white'); t.setAttribute('font-size', '11');
    t.setAttribute('font-weight', '700'); t.setAttribute('font-family', 'sans-serif');
    t.setAttribute('text-anchor', 'middle');
    t.textContent = a.label;
    g.appendChild(t);

    const tri = document.createElementNS(ns, 'polygon');
    let pts;
    if (isRight) {
      pts = `${arrowX},${ay} ${arrowX-13},${ay-7} ${arrowX-13},${ay+7}`;
    } else if (isUp) {
      pts = `${ax},${arrowTip} ${ax-8},${arrowTip+13} ${ax+8},${arrowTip+13}`;
    } else {
      pts = `${ax},${arrowTip} ${ax-8},${arrowTip-13} ${ax+8},${arrowTip-13}`;
    }
    tri.setAttribute('points', pts); tri.setAttribute('fill', CLAY);
    g.appendChild(tri);
    svg.appendChild(g);
  });

  layer.innerHTML = '';
  layer.appendChild(svg);
}

function goTo(i) {
  if (i < 0 || i >= STEPS.length) return;
  stopVoice();
  cur = i;
  render();
}

function togglePlay() {
  if (cur === STEPS.length - 1 && !playing) cur = 0;
  playing = !playing;
  if (playing) scheduleNext();
  else { clearTimeout(playTimer); stopVoice(); }
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
}

function scheduleNext() {
  if (!playing) return;
  playTimer = setTimeout(() => {
    if (cur < STEPS.length - 1) { cur++; render(); scheduleNext(); }
    else { playing = false; document.getElementById('btn-play').textContent = '↺ Replay'; }
  }, 3800);
}

function animateArrows() {
  bounceAngle += 0.08;
  renderArrows();
  requestAnimationFrame(animateArrows);
}

window.addEventListener('resize', renderArrows);
render();
animateArrows();
</script>
