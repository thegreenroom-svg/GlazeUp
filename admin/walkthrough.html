<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kilnLINK — Staff Tour</title>
<style>
  :root { --clay:#B87946; --charcoal:#2B2724; --ivory:#F7F4EE; --sand:#E8D9C4; --stone:#C8BFB2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#f0ebe4; font-family:'Inter',-apple-system,system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; }
  .wt-header { background:var(--charcoal); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .wt-logo { color:white; font-size:18px; font-weight:700; }
  .wt-logo span { color:var(--clay); font-weight:400; }
  .wt-close { background:rgba(255,255,255,0.12); border:none; color:white; border-radius:20px; padding:7px 16px; font-size:13px; cursor:pointer; }
  .wt-progress-bar { height:3px; background:rgba(0,0,0,0.1); }
  .wt-progress-fill { height:100%; background:var(--clay); transition:width 0.4s ease; }
  .wt-info { padding:12px 20px 10px; }
  .wt-step-label { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--clay); font-weight:600; margin-bottom:4px; }
  .wt-title { font-size:17px; font-weight:700; color:var(--charcoal); line-height:1.25; margin-bottom:5px; }
  .wt-body { font-size:13px; color:#6b5f56; line-height:1.6; min-height:44px; }
  .wt-narration { font-size:13px; color:var(--clay); line-height:1.65; margin-top:8px; padding:10px 12px; background:rgba(184,121,70,0.08); border-left:3px solid var(--clay); border-radius:0 6px 6px 0; display:none; font-style:italic; }
  .wt-screen-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:10px 16px; position:relative; overflow:hidden; }
  .wt-screen { width:100%; max-width:580px; position:relative; }
  .wt-screen svg.main { width:100%; border-radius:10px; box-shadow:0 4px 20px rgba(43,39,36,0.18); display:block; }
  .wt-controls { padding:12px 20px 18px; display:flex; flex-direction:column; align-items:center; gap:10px; background:white; border-top:1px solid #e0d8d0; }
  .wt-btn-row { display:flex; gap:8px; }
  .wt-btn { background:#f0ebe4; border:1px solid #d0c8c0; color:var(--charcoal); border-radius:8px; padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer; }
  .wt-btn-primary { background:var(--clay); color:white; border-color:var(--clay); }
  .wt-btn:disabled { opacity:.35; cursor:default; }
  .wt-dots { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
  .wt-dot { width:7px; height:7px; border-radius:50%; background:#d0c8c0; border:none; cursor:pointer; padding:0; transition:all .2s; }
  .wt-dot.active { background:var(--clay); width:20px; border-radius:4px; }

  /* ── Accessibility ── */
  :focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  .wt-btn:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  .wt-dot:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* High contrast / forced colours mode */
  @media (forced-colors: active) {
    .wt-btn { border: 2px solid ButtonText; forced-color-adjust: none; }
    .wt-btn-primary, #btn-voice { background: Highlight; color: HighlightText; border-color: Highlight; }
    .wt-dot.active { background: Highlight; }
    .wt-progress-fill { background: Highlight; }
    .wt-narration { border-left-color: Highlight; color: ButtonText; background: transparent; }
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    .wt-progress-fill { transition: none; }
    .wt-dot { transition: none; }
  }

  /* Large text / zoom support */
  @media (min-width: 1px) {
    .wt-btn { min-height: 44px; min-width: 44px; }
    .wt-dot { min-width: 24px; min-height: 24px; border-radius: 50%; }
    .wt-dot.active { border-radius: 4px; }
  }
</style>
</head>
<body>
<a href="#wt-main-content" class="sr-only" style="position:absolute;top:4px;left:4px;padding:8px 16px;background:#B87946;color:white;border-radius:6px;font-weight:700;font-size:14px;z-index:99999;text-decoration:none;">Skip to content</a>
<div class="wt-header" role="banner">
  <div class="wt-logo" aria-label="kilnLINK Staff Tour"><span aria-hidden="true">kiln</span><span aria-hidden="true">LINK</span><span class="sr-only">kilnLINK</span> Staff Tour</div>
  <button class="wt-close" onclick="history.back()" aria-label="Close walkthrough and go back">✕ Close</button>
</div>
<div class="wt-progress-bar" role="progressbar" aria-valuemin="1" aria-valuemax="100" aria-valuenow="11" aria-label="Tour progress" id="progress-bar"><div class="wt-progress-fill" id="progress"></div></div>
<div class="wt-info" id="wt-main-content">
  <div class="wt-step-label" id="step-label" aria-live="polite" aria-atomic="true">Step 1 of 29</div>
  <h1 class="wt-title" id="step-title" aria-live="assertive" aria-atomic="true"></h1>
  <p class="wt-body" id="step-body" aria-live="polite" aria-atomic="true"></p>
  <p class="wt-narration" id="step-narration" aria-live="polite" aria-label="Narration text"></p>
</div>
<div class="wt-screen-wrap">
  <div class="wt-screen" id="screen-wrap">
    <svg class="main" id="main-svg" viewBox="0 0 280 180" role="img" aria-labelledby="svg-title svg-desc"><title id="svg-title">Staff dashboard screen mockup</title><desc id="svg-desc">An annotated illustration of the kilnLINK staff dashboard for this step</desc>
      <g id="screen-content"></g>
      <g id="arrow-layer"></g>
    </svg>
  </div>
</div>
<div class="wt-controls" role="navigation" aria-label="Tour controls">
  <div class="wt-btn-row" role="group" aria-label="Navigation buttons">
    <button class="wt-btn" id="btn-back" onclick="goTo(cur-1)" aria-label="Go to previous step">← Back</button>
    <button class="wt-btn wt-btn-primary" id="btn-play" onclick="togglePlay()" aria-label="Play automatic tour">▶ Play</button>
    <button class="wt-btn" id="btn-next" onclick="goTo(cur+1)" aria-label="Go to next step">Next →</button>
    <button class="wt-btn" id="btn-voice" onclick="toggleVoice()" style="background:#B87946;color:white;border-color:#B87946">🔇 Mute</button>
  </div>
  <div class="wt-dots" id="dots" role="tablist" aria-label="Jump to step"></div>
</div>

<script>
const CLAY='#B87946',CHARCOAL='#2B2724',IVORY='#F7F4EE',SAND='#E8D9C4',STONE='#C8BFB2';

    {id:'stock',icon:'⊞',label:'Stock'},
    {id:'menu',icon:'☕',label:'Daily Menu'},
    {id:'team',icon:'👥',label:'Team & Duties'},
    {id:'progress',icon:'📊',label:'Daily Progress'},
    {id:'branding',icon:'✎',label:'Branding'},
    {id:'shapes',icon:'▲',label:'Bisque'},
  ];
  return `
    <rect width="58" height="180" fill="${CHARCOAL}"/>
    <text x="6" y="12" fill="${CLAY}" font-size="7" font-weight="700" font-family="sans-serif">kiln</text>
    <text x="22" y="13" fill="white" font-size="8" font-weight="700" font-family="sans-serif">LINK</text>
    ${items.map((item,i)=>`
      <rect x="2" y="${24+i*17}" width="54" height="14" rx="3" fill="${activeTab===item.id?CLAY:'transparent'}" opacity="${activeTab===item.id?0.9:1}"/>

    <text x="29" y="172.5" fill="rgba(255,255,255,0.6)" font-size="5" font-family="sans-serif" text-anchor="middle">🎯 Staff Tour</text>
  `;
}

let cur = 0, playing = false, playTimer = null, bounceAngle = 0;
let screenCache = {}, voiceOn = true;

// ── Voice narration ──
function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  const preferred = [
    'Google UK English Female',
    'Microsoft Sonia Online (Natural) - English (United Kingdom)',
    'Microsoft Libby Online (Natural) - English (United Kingdom)',
    'Karen', 'Moira', 'Samantha', 'Victoria', 'Fiona',
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name === name);
    if (v) return v;
  }
  const gbFemale = voices.find(v => v.lang === 'en-GB' && /female|woman|girl/i.test(v.name));
  if (gbFemale) return gbFemale;
  return voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en')) || null;
}

function speak(text, onEnd) {
  if (!window.speechSynthesis || !text) { if (onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.88; utt.pitch = 1.1; utt.lang = 'en-GB';
  const v = getBestVoice();
  if (v) utt.voice = v;
  utt.onstart = () => { const b = document.getElementById('btn-voice'); if(b) b.textContent='🔊 Speaking…'; };
  utt.onend = () => {
    const b = document.getElementById('btn-voice');
    if(b) b.textContent='🔇 Mute';
    if (onEnd) onEnd();
  };
  utt.onerror = () => { if (onEnd) onEnd(); };
  window.speechSynthesis.speak(utt);
}
function stopVoice() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }
function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('btn-voice');
  const narEl = document.getElementById('step-narration');
  if (voiceOn) {
    btn.textContent = '🔇 Mute';
    btn.style.background = '#B87946'; btn.style.color = 'white'; btn.style.borderColor = '#B87946';
    narEl.style.display = 'block';
    speak(STEPS[cur].voice);
  } else {
    btn.textContent = '🔊 Unmute';
    btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = '';
    narEl.style.display = 'none';
    stopVoice();
  }
}

function initVoice() {
  if (!window.speechSynthesis) return;
  // NOTE: this only sets up the voice/UI state — it must NOT call speak()
  // itself. render() (called once on page load, below) already speaks the
  // first step. If both fired, the browser's speech queue would get two
  // overlapping utterances for the same line, heard as a stutter/repeat.
  let started = false;
  const tryStart = () => {
    if (started) return;
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      started = true;
      const btn = document.getElementById('btn-voice');
      if (btn) { btn.textContent = '🔇 Mute'; btn.style.background = '#B87946'; btn.style.color = 'white'; btn.style.borderColor = '#B87946'; }
      document.getElementById('step-narration').style.display = 'block';
    }
  };
  window.speechSynthesis.onvoiceschanged = tryStart;
  setTimeout(tryStart, 300);
}

function getScreen(stepIdx) {
  const step = STEPS[stepIdx];
  if (step.screen) return step.screen();
  return screenCache[stepIdx] || dashboardScreen();
}

function render() {
  const step = STEPS[cur];

  document.getElementById('progress').style.width = `${((cur+1)/STEPS.length)*100}%`;
  document.getElementById('step-label').textContent = `Step ${cur+1} of ${STEPS.length}`;
  document.getElementById('step-title').textContent = step.title;
  document.getElementById('step-body').textContent = step.body;
  const narEl = document.getElementById('step-narration');
  narEl.textContent = step.voice;
  narEl.style.display = 'block';

  const content = getScreen(cur);
  screenCache[cur] = content;
  document.getElementById('screen-content').innerHTML = content;

  document.getElementById('btn-back').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === STEPS.length - 1;
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : cur === STEPS.length-1 ? '↺ Replay' : '▶ Play';

  const dots = document.getElementById('dots');
  dots.innerHTML = STEPS.map((_,i) =>
    `<button class="wt-dot${i===cur?' active':''}" onclick="goTo(${i})" role="tab" aria-selected="${i===cur}" aria-label="Go to step ${i+1}" title="Step ${i+1}"></button>`
  ).join('');

  // Only speak here when not auto-playing — during Play mode, scheduleNext()
  // owns speech (it needs the onEnd callback to know when to advance). If
  // render() also called speak() independently, the two would race and
  // cancel/restart each other, causing the voice to stutter or repeat.
  if (voiceOn && !playing) speak(step.voice);
  renderArrows();
  if (typeof updateProgressAria !== 'undefined') updateProgressAria();
}

function renderArrows() {
  const step = STEPS[cur];
  const layer = document.getElementById('arrow-layer');
  layer.innerHTML = '';
  if (!step.arrows.length) return;

  const bounce = Math.sin(bounceAngle) * 3;
  const ns = 'http://www.w3.org/2000/svg';

  step.arrows.forEach(a => {
    // All coordinates are in SVG viewBox space (280x180) — no DOM math needed
    const ax = a.vx, ay = a.vy;
    const isUp = a.dir === 'up';
    const isRight = a.dir === 'right';

    const g = document.createElementNS(ns, 'g');

    // Arrow triangle — bounces in place
    const tri = document.createElementNS(ns, 'polygon');
    let pts, labelX, labelY;

    if (isRight) {
      const tipX = ax + 4 + bounce;
      pts = `${tipX},${ay} ${tipX-9},${ay-5} ${tipX-9},${ay+5}`;
      labelX = tipX + 16;
      labelY = ay;
    } else if (isUp) {
      const tipY = ay - 8 + bounce;
      pts = `${ax},${tipY} ${ax-6},${tipY+9} ${ax+6},${tipY+9}`;
      labelX = ax;
      labelY = tipY - 12;
    } else {
      const tipY = ay + 8 - bounce;
      pts = `${ax},${tipY} ${ax-6},${tipY-9} ${ax+6},${tipY-9}`;
      labelX = ax;
      labelY = tipY + 16;
    }

    tri.setAttribute('points', pts);
    tri.setAttribute('fill', CLAY);
    g.appendChild(tri);

    // Label bubble
    const labelW = a.label.length * 2.2 + 8;
    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('x', labelX - labelW/2);
    bg.setAttribute('y', isRight ? labelY - 4 : labelY - 7);
    bg.setAttribute('width', labelW);
    bg.setAttribute('height', 9);
    bg.setAttribute('rx', '4');
    bg.setAttribute('fill', CLAY);
    g.appendChild(bg);

    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', labelX);
    t.setAttribute('y', isRight ? labelY + 2 : labelY - 0.5);
    t.setAttribute('fill', 'white');
    t.setAttribute('font-size', '4.5');
    t.setAttribute('font-weight', '700');
    t.setAttribute('font-family', 'sans-serif');
    t.setAttribute('text-anchor', 'middle');
    t.textContent = a.label;
    g.appendChild(t);

    layer.appendChild(g);
  });
}

function goTo(i) {
  if (i < 0 || i >= STEPS.length) return;
  stopVoice();
  cur = i;
  render();
}

function togglePlay() {
  if (cur === STEPS.length - 1 && !playing) cur = 0;
  playing = !playing;
  if (playing) scheduleNext();
  else { clearTimeout(playTimer); stopVoice(); }
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
}

function scheduleNext() {
  if (!playing) return;
  if (voiceOn && STEPS[cur].voice) {
    // Speak current step, then advance when speech finishes (plus a short pause)
    speak(STEPS[cur].voice, () => {
      if (!playing) return;
      setTimeout(() => {
        if (!playing) return;
        if (cur < STEPS.length - 1) { cur++; render(); scheduleNext(); }
        else { playing = false; document.getElementById('btn-play').textContent = '↺ Replay'; }
      }, 1200);
    });
  } else {
    // No voice — use fixed 4 second timer
    playTimer = setTimeout(() => {
      if (!playing) return;
      if (cur < STEPS.length - 1) { cur++; render(); scheduleNext(); }
      else { playing = false; document.getElementById('btn-play').textContent = '↺ Replay'; }
    }, 4000);
  }
}

function animateArrows() {
  bounceAngle += 0.06;
  renderArrows();
  requestAnimationFrame(animateArrows);
}


// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': e.preventDefault(); goTo(cur+1); break;
    case 'ArrowLeft':  case 'ArrowUp':   e.preventDefault(); goTo(cur-1); break;
    case ' ': e.preventDefault(); togglePlay(); break;
    case 'm': case 'M': toggleVoice(); break;
    case 'Home': e.preventDefault(); goTo(0); break;
    case 'End':  e.preventDefault(); goTo(STEPS.length-1); break;
    case 'Escape': history.back(); break;
  }
});

// ── Update ARIA progress bar ──
function updateProgressAria() {
  const bar = document.getElementById('progress-bar');
  if (bar) {
    const pct = Math.round(((cur+1)/STEPS.length)*100);
    bar.setAttribute('aria-valuenow', pct);
    bar.setAttribute('aria-label', `Step ${cur+1} of ${STEPS.length}`);
  }
}

render();
animateArrows();
initVoice();
updateProgressAria();
</script>
