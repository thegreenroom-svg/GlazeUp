<svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Host By Post — clean wordmark stand-in built to brand (clay #B87946
       + ink #2B2724 on cream). Parcel/box motif above a stacked wordmark.
       Replace with the real box.svg from the HBP media library when to hand. -->
  <defs>
    <style>
      .hbp-ink { fill: #2B2724; }
      .hbp-clay { fill: #B87946; }
      .hbp-stroke-clay { fill: none; stroke: #B87946; stroke-width: 3; }
      .hbp-stroke-ink { fill: none; stroke: #2B2724; stroke-width: 2.4; }
    </style>
  </defs>

  <!-- Parcel / box mark -->
  <g transform="translate(120,34)">
    <!-- box outline -->
    <path d="M -26 -14 L 0 -24 L 26 -14 L 26 12 L 0 22 L -26 12 Z"
      class="hbp-stroke-clay" stroke-linejoin="round"/>
    <!-- lid crease -->
    <path d="M -26 -14 L 0 -4 L 26 -14 M 0 -4 L 0 22"
      class="hbp-stroke-clay" stroke-linejoin="round"/>
    <!-- string / ribbon -->
    <path d="M 0 -24 L 0 -4 M -13 -19 L -13 5 M 13 -19 L 13 5"
      class="hbp-stroke-ink" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(120,86)" text-anchor="middle">
    <text x="0" y="0" class="hbp-ink"
      font-family="Fraunces, Georgia, serif" font-weight="600"
      font-size="26" letter-spacing="0.5">Host By Post</text>
    <text x="0" y="20" class="hbp-clay"
      font-family="Inter, -apple-system, sans-serif" font-weight="600"
      font-size="8.5" letter-spacing="2.4">YOU HOST IT · WE POST IT</text>
  </g>
</svg>
